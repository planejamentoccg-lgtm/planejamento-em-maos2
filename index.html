}

.linha1 {

}
.painel {

.topoLista {

.verMais {

.label {

}

.painel h1 {

.metricas div {

.metricas p {

}

/* ✅ NO PRAZO */

}

/* ✅ BOLINHA */

}

}

  background: #e53935;
}

.itemPainel {

}

/* ícone com fundo suave */

/* ✅ DIVISOR */

  height: 30px;
  background: #ddd;
  margin: 0 10px;
}

/* ✅ NOME DO APP */
.nomeApp {

  color: #555;
  flex: 1;
}

/* ✅ SININHO */

.notif {

  align-items: center;
  justify-content: center;

  height: 28px;

}

.notif img {

  height: 14px;
}

#topo .notif img {

  height: 14px;
}

#contadorNotif {

}


    /* ✅ HOME */
   
    .tituloBanner {

    }

#login {
  position: relative;
  min-height: 100vh;
  display: flex;

.textosTitulo {

}

.campoLogin label {
  display: block;

.cantoLogin.bl { bottom: 0; left: 0; border-bottom-width: 1.5px; border-left-width: 1.5px; }
.cantoLogin.br { bottom: 0; right: 0; border-bottom-width: 1.5px; border-right-width: 1.5px; }

  margin-top: 12px;

  background: var(--ink);

  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 500;

}
.btnLogin:hover { background: var(--accent); color: #fff; }

   ✅ REDESIGN DA TELA INICIAL (hero, régua de progresso, agenda, gantt)
   =========================================================== */
:root{
  --ink:#131F1D;
  --ink-2:#1C2B28;
  --paper:#FFFFFF;
  --paper-2:#F2F2F0;
  --line:#D8D7CD;
  --line-dark:#2E3E3A;
  --accent:#6F8F3F;
  --accent-bright:#8FB84B;
  --text-soft:#6B7570;
  --text-soft-dark:#8FA098;
  /* ✅ painel/hero — sempre escuro, não inverte com o tema */
  --painel-1:#131F1D;
  --painel-2:#1C2B28;
  --painel-texto:#F2F1EA;
  --card-fundo:#FFFFFF;
  --icone-cor:#131F1D;
}

/* ✅ TEMA ESCURO — inverte as variáveis; tudo que usa var(--...) responde
   automaticamente. Vale pra tela inicial e pro gráfico de Gantt. */
body.tema-escuro{
  --ink:#F2F1EA;
  --ink-2:#EDECE5;
  --paper:#12201C;
  --paper-2:#1C2B28;
  --line:#33443F;
  --line-dark:#465852;
  --accent:#8FB84B;
  --accent-bright:#A8D666;
  --text-soft:#93A49C;
  --text-soft-dark:#6B7570;
  --painel-1:#0B120F;
  --painel-2:#12201C;
  --painel-texto:#F2F1EA;
  --card-fundo:#1C2B28;
  --icone-cor:#F2F1EA;
  background:var(--paper);
}

.toggleTema{
  width:20px; height:20px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
  font-size:15px;
  margin-right:14px;
  color:var(--ink);
}

#lista{ background:var(--paper); padding-bottom:70px; }
#telaProximasSemanas{ background:var(--paper); padding-bottom:70px; min-height:100vh; }
#telaCronograma{ background:var(--paper); padding-bottom:70px; min-height:100vh; }

#navInferior{
  position:fixed;
  bottom:0; left:0; right:0;
  display:flex;
  justify-content:space-around;
  background:var(--card-fundo);
  border-top:1px solid var(--line);
  padding:8px 0 10px;
  z-index:20;
}
.navItem{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:2px;
  font-family:'IBM Plex Sans', sans-serif;
  font-size:10.5px;
  color:var(--text-soft);
  cursor:pointer;
  flex:1;
}
.navItem.ativo{ color:var(--accent); font-weight:600; }
.navIcone{ width:20px; height:20px; }


/* -------- topo -------- */
#lista #topo{
  background:var(--paper);
  border-bottom:1px solid var(--line);
}
#lista #topo img[src*="iZ8gr1i"],
#detalhe #topo img[src*="iZ8gr1i"],
#semanas #topo img[src*="iZ8gr1i"],
#telaGantt #topo img[src*="iZ8gr1i"],
#notificacoes #topo img[src*="iZ8gr1i"]{
  background:#FFFFFF;
  border-radius:8px;
  padding:4px 8px;
}
body.tema-escuro .iconeIndicador{
  filter: brightness(0) invert(1);
  opacity: 0.55;
}

/* -------- hero -------- */
.heroNovo{
  background:linear-gradient(160deg, var(--painel-1) 0%, var(--painel-2) 100%);
  padding:28px 20px 26px;
  color:var(--painel-texto);
  text-align:left;
}
.heroNovo .eyebrow{
  font-family:'IBM Plex Mono', monospace;
  font-size:10px;
  letter-spacing:0.16em;
  color:var(--accent-bright);
  text-transform:uppercase;
  margin-bottom:10px;
}
.heroNovo h1{
  font-family:'Archivo', sans-serif;
  font-weight:800;
  font-size:30px;
  letter-spacing:-0.02em;
  line-height:1.05;
  margin-bottom:22px;
  color:var(--painel-texto);
}
.kpiGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1px;
  background:var(--line-dark);
  border:1px solid var(--line-dark);
  max-width:700px;
  margin:0 auto;
}
.kpiCard{
  position:relative;
  background:var(--painel-1);
  padding:16px 14px 14px;
  text-align:left;
}
.kpiCard::before, .kpiCard::after{
  content:''; position:absolute; width:9px; height:9px;
}
.kpiCard::before{ top:6px; left:6px; border-top:1.5px solid var(--accent); border-left:1.5px solid var(--accent); }
.kpiCard::after{ bottom:6px; right:6px; border-bottom:1.5px solid var(--accent); border-right:1.5px solid var(--accent); }
.kpiCard .val{
  font-family:'IBM Plex Mono', monospace;
  font-weight:600;
  font-size:24px;
  color:#F2F1EA;
  line-height:1;
  margin-bottom:8px;
}
.kpiCard .val.pos{ color:var(--accent-bright); }
.kpiCard .lbl{
  font-family:'IBM Plex Sans', sans-serif;
  font-size:10.5px;
  letter-spacing:0.04em;
  color:var(--text-soft-dark);
  text-transform:uppercase;
}

/* -------- seções -------- */
.secaoNova{ padding:26px 20px 6px; max-width:700px; margin:0 auto; text-align:left; }
.secaoNova .cabecalho{
  display:flex; align-items:baseline; justify-content:space-between;
  margin-bottom:14px; flex-wrap:wrap; gap:8px;
}
.secaoNova .tituloSecao{
  font-family:'IBM Plex Mono', monospace;
  font-size:10.5px;
  letter-spacing:0.14em;
  text-transform:uppercase;
  color:var(--text-soft);
}
.secaoNova .contagemSecao{
  font-family:'IBM Plex Mono', monospace;
  font-size:10.5px;
  color:var(--text-soft);
}
.secaoNova hr.regra{ border:none; border-top:1px solid var(--line); margin-bottom:18px; }

.btnGantt{
  font-family:'IBM Plex Mono', monospace;
  font-size:10px;
  letter-spacing:0.06em;
  text-transform:uppercase;
  color:var(--ink);
  background:var(--paper-2);
  border:1px solid var(--line);
  padding:6px 10px;
  cursor:pointer;
  border-radius:2px;
}
.btnGantt:hover{ background:var(--line); }

.caixaBusca{
  display:flex;
  gap:8px;
  margin:14px 0 4px;
}
.caixaBusca input{
  flex:1;
  font-family:'IBM Plex Sans', sans-serif;
  font-size:13px;
  color:var(--ink);
  background:var(--card-fundo);
  border:1px solid var(--line);
  border-radius:4px;
  padding:9px 12px;
  min-width:0;
}
.caixaBusca input::placeholder{ color:var(--text-soft); }
.caixaBusca input:focus{ outline:none; border-color:var(--accent); }
.btnBusca{
  font-family:'IBM Plex Mono', monospace;
  font-size:11px;
  letter-spacing:0.06em;
  text-transform:uppercase;
  color:#fff;
  background:var(--accent);
  border:none;
  padding:0 16px;
  border-radius:4px;
  cursor:pointer;
  flex-shrink:0;
}
.btnBusca:hover{ background:var(--accent-bright); }

.sugestoesBusca{
  position:absolute;
  top:100%; left:0; right:0;
  z-index:30;
  background:var(--card-fundo);
  border:1px solid var(--line);
  border-radius:6px;
  margin-top:4px;
  max-height:380px;
  overflow-y:auto;
  box-shadow:0 6px 20px rgba(0,0,0,0.15);
}
.sugestaoItem{
  padding:10px 14px;
  font-size:12.5px;
  font-family:'IBM Plex Sans', sans-serif;
  color:var(--ink);
  cursor:pointer;
  border-bottom:1px solid var(--line);
  text-align:left;
}
.sugestaoItem:last-child{ border-bottom:none; }
.sugestaoItem:hover{ background:var(--paper-2); }

.calendarioPopup{ padding:14px; }
.calendarioAbas{ display:flex; gap:8px; margin-bottom:14px; }
.calendarioAba{
  flex:1;
  border:1px solid var(--line);
  border-radius:8px;
  padding:8px 12px;
  text-align:left;
}
.calendarioAba.ativa{ border-color:var(--accent); background:var(--paper-2); }
.calendarioAbaLabel{
  font-family:'IBM Plex Mono', monospace;
  font-size:9.5px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:var(--text-soft);
}
.calendarioAbaData{ font-size:14px; color:var(--ink); margin-top:2px; }
.calendarioNav{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:10px;
}
.calendarioMesAno{
  font-family:'Archivo', sans-serif;
  font-size:13.5px;
  font-weight:700;
  color:var(--ink);
}
.calendarioSeta{
  cursor:pointer;
  padding:4px 12px;
  font-size:16px;
  color:var(--ink);
  border:1px solid var(--line);
  border-radius:20px;
  user-select:none;
}
.calendarioSeta:hover{ background:var(--paper-2); }
.calendarioSemana{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  text-align:center;
  font-family:'IBM Plex Mono', monospace;
  font-size:9.5px;
  color:var(--text-soft);
  margin-bottom:6px;
}
.calendarioGrade{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:2px;
}
.calDia, .calDiaVazio{
  text-align:center;
  padding:9px 0;
  font-size:12.5px;
  border-radius:4px;
  cursor:pointer;
  color:var(--ink);
}
.calDiaVazio{ cursor:default; }
.calDia:hover{ background:var(--paper-2); }
.calDiaSelecionado{ background:var(--accent); color:#fff; font-weight:600; }
.calDiaIntervalo{ background:var(--paper-2); }

#resultadoBuscaF, #resultadoBuscaS{
  position:relative;
  padding-top:4px;
}
.fecharBusca{
  position:absolute;
  top:8px;
  right:0;
  font-family:'IBM Plex Sans', sans-serif;
  font-size:18px;
  line-height:1;
  color:var(--text-soft);
  cursor:pointer;
  padding:4px 6px;
}
.fecharBusca:hover{ color:var(--ink); }

.btnVoltar{
  display:block;
  margin:20px auto 30px;
  font-family:'IBM Plex Mono', monospace;
  font-size:11px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:var(--ink);
  background:var(--card-fundo);
  border:1px solid var(--line);
  padding:10px 22px;
  border-radius:4px;
  cursor:pointer;
}
.btnVoltar:hover{ background:var(--paper-2); }

/* -------- régua de progresso (frentes) -------- */
.frenteNova{
  padding:16px 0;
  border-bottom:1px solid var(--line);
  cursor:pointer;
}
.frenteNova:last-child{ border-bottom:none; }
.frenteNova .topo2{
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:10px;
}
.frenteNova .nome2{
  font-family:'Archivo', sans-serif;
  font-weight:700;
  font-size:16.5px;
  color:var(--ink);
  letter-spacing:-0.01em;
}
.tagStatus{
  display:inline-flex; align-items:center; gap:5px;
  font-family:'IBM Plex Mono', monospace;
  font-size:9.5px;
  letter-spacing:0.06em;
  text-transform:uppercase;
  padding:3px 7px;
  border:1px solid var(--accent);
  color:var(--accent);
}
.tagStatus.atrasada{ border-color:#c0392b; color:#c0392b; }
.tagStatus .ponto{ width:5px; height:5px; border-radius:50%; background:currentColor; }

.regua{ position:relative; height:16px; margin-bottom:8px; }
.regua-trilho{
  position:absolute; top:6px; left:0; right:0; height:3px;
  background:var(--paper-2); border:1px solid var(--line);
}
.regua-preenchida{
  position:absolute; top:6px; left:0; height:3px; background:var(--accent);
}
.regua-marcas{
  position:absolute; top:0; left:0; right:0; height:16px;
  display:flex; justify-content:space-between;
}
.regua-marcas span{ width:1px; height:6px; background:var(--line); }
.regua-marcas span:nth-child(5n+1){ height:9px; background:#B9B8AC; }

.frenteNova .baixo2{ display:flex; align-items:center; justify-content:space-between; }
.frenteNova .pct2{
  font-family:'IBM Plex Mono', monospace;
  font-weight:600; font-size:14px; color:var(--ink);
}
.frenteNova .meta2{
  font-family:'IBM Plex Mono', monospace;
  font-size:10.5px; color:var(--text-soft);
}

/* -------- agenda (próximas semanas) -------- */
.agendaItem{
  display:flex; gap:16px;
  padding:16px 0 22px;
  border-bottom:1px solid var(--line);
  cursor:pointer;
}
.agendaItem:last-child{ border-bottom:none; }
.agendaData{
  font-family:'IBM Plex Mono', monospace;
  text-align:center;
  padding-right:16px;
  border-right:1px solid var(--line);
  min-width:44px;
  flex-shrink:0;
}
.agendaData .dia2{ font-size:22px; font-weight:600; color:var(--ink); line-height:1; }
.agendaData .mes2{ font-size:9.5px; letter-spacing:0.1em; color:var(--text-soft); margin-top:4px; }

.agendaBody .titulo2{
  font-family:'Archivo', sans-serif;
  font-weight:700; font-size:15.5px; color:var(--ink); margin-bottom:2px;
}
.subtitulo2{
  font-family:'IBM Plex Mono', monospace;
  font-size:11px; color:var(--accent); margin-bottom:10px;
  text-align:left;
}
.agendaRow{
  font-family:'IBM Plex Sans', sans-serif;
  font-size:12px; color:var(--text-soft); margin-bottom:6px;
}
.agendaRow b{ color:var(--ink); }
.agendaVerMais{
  font-family:'IBM Plex Mono', monospace;
  font-size:10.5px; letter-spacing:0.04em; color:var(--accent);
  margin-top:4px; display:inline-block;
}

/* -------- gráfico de gantt -------- */
#telaGantt{ background:var(--paper); }
#telaGantt #topo, #semanas #topo, #detalhe #topo{
  background:var(--paper);
  border-bottom:1px solid var(--line);
  color:var(--ink);
}
#semanas{ background:var(--paper); }
#detalhe{ background:var(--paper); }
#bannerSemanas h1{ color:#F2F1EA; }
.ganttWrap{
  padding:16px 16px 40px;
  max-width:900px;
  margin:0 auto;
}

.ganttNovo{
  font-family:'IBM Plex Sans', sans-serif;
}

.ganttLinhaEixo, .ganttLinhaH{
  display:flex;
  align-items:center;
  gap:8px;
  min-height:30px;
  border-bottom:1px solid var(--line);
}

.ganttLinhaEixo{
  position:relative;
  min-height:22px;
  border-bottom:1px solid var(--line-dark);
  margin-bottom:6px;
}

.ganttLabelH{
  width:118px; flex-shrink:0;
  font-size:11px;
  color:var(--ink);
  line-height:1.3;
  word-break:break-word;
}
.ganttTopico{
  display:block;
  font-family:'IBM Plex Mono', monospace;
  font-size:9px;
  color:var(--text-soft);
  margin-bottom:1px;
}

.ganttTrilhaH{
  position:relative;
  flex:1;
  height:26px;
}

.ganttMarcaMes{
  position:absolute;
  top:0;
  transform:translateX(-2px);
  font-family:'IBM Plex Mono', monospace;
  font-size:9.5px; font-weight:600;
  color:var(--ink);
  white-space:nowrap;
}

.ganttBarraH{
  position:absolute;
  top:6px; height:14px;
  background:var(--accent);
  border-radius:3px;
  z-index:1;
}

.ganttGrupoH{
  font-family:'IBM Plex Mono', monospace;
  font-size:11px; letter-spacing:0.1em; text-transform:uppercase;
  color:var(--ink); font-weight:700;
  margin:18px 0 4px;
  padding-top:12px;
  border-top:1px solid var(--line-dark);
}
.ganttGrupoH:first-of-type{ border-top:none; padding-top:0; margin-top:8px; }

// ✅ LOGIN
async function login() {

  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const dispositivoAtual = navigator.userAgent;

  const ref = db.collection("Sessoes").doc(email);
  const doc = await ref.get();

  // ✅ verifica se já existe sessão
  if (doc.exists) {
    const dados = doc.data();

    if (dados.dispositivo !== dispositivoAtual) {
      alert("Este usuário já está logado em outro dispositivo.");
      return;
    }
  }

  try {
    await auth.signInWithEmailAndPassword(email, senha);

    // ✅ salva sessão
    await db.collection("Sessoes").doc(email).set({
      dispositivo: dispositivoAtual,
      data: new Date()
    });

    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";

    mostrarTelaFrentes();

  } catch(e) {
    alert(e.message);
  }
}
async function logout() {

  const email = auth.currentUser.email;

  await db.collection("Sessoes").doc(email).delete();
  await auth.signOut();

  location.reload();
}

async function carregarProximasSemanas() {

  const container = document.getElementById("telaProximasSemanas");

      <div style="display:flex; align-items:center;">

    </div>

        <span class="tituloSecao">Próximas semanas</span>
        <button class="btnGantt" onclick="abrirGantt()">📊 Gráfico de Gantt</button>

      <div class="caixaBusca" style="position:relative;">
        <input type="text" id="inputBuscaS" placeholder="Pergunte algo... ex: o que está previsto para hoje?"
               oninput="mostrarSugestoes('S')" onfocus="mostrarSugestoes('S')"
               onkeypress="if(event.key==='Enter') buscarInteligente('S')">
        <button class="btnBusca" onclick="buscarInteligente('S')">Buscar</button>
        <div class="sugestoesBusca" id="sugestoesBuscaS" style="display:none;"></div>
      </div>
      <div id="resultadoBuscaS"></div>

      <div id="listaProximasSemanas" style="margin-top:14px;"></div>
    </section>
  `;

  atualizarIconeTema();

  const listaContainer = document.getElementById("listaProximasSemanas");

  const snapSemanas = await db.collection("ProximasSemanas").get();

  const frentesSemanas = [];

  snapSemanas.forEach(doc => {
    const d = doc.data();
    const tarefas = d.Tarefas || [];
    if (tarefas.length === 0) return;

    // ✅ início: usa o dia-a-dia VISÍVEL (evita início muito antigo
    // quando a tarefa já não tem mais nada previsto nos dias recentes).
    // término: usa a data OFICIAL da planilha (D/E) — essa planilha só
    // mostra algumas semanas do cronograma inteiro, então usar o
    // dia-a-dia visível faria parecer que o trabalho termina antes do
    // previsto de verdade
    let menorInicio = null, maiorTermino = null;

    tarefas.forEach(t => {
      const dias = t.Diario || [];
      if (dias.length > 0) {
        const dataInicio = parseDiaMes(dias[0].Data);
        if (dataInicio && (!menorInicio || dataInicio < menorInicio)) menorInicio = dataInicio;
      }

      const dataTerminoOficial = parseDiaMes(t.TerminoPrevisto);
      if (dataTerminoOficial && (!maiorTermino || dataTerminoOficial > maiorTermino)) maiorTermino = dataTerminoOficial;
    });

    frentesSemanas.push({ dados: d, tarefas, menorInicio, maiorTermino });
  });

  // ✅ ordem cronológica pura: quem começa primeiro aparece primeiro
  frentesSemanas.sort((a, b) => {
    if (!a.menorInicio) return 1;
    if (!b.menorInicio) return -1;
    return a.menorInicio - b.menorInicio;
  });

  // ✅ guarda pra reaproveitar no gráfico de Gantt sem precisar buscar de novo
  window.todasFrentesSemanas = frentesSemanas.map(item => item.dados);

  const MESES_ABREV = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];

  frentesSemanas.forEach(item => {
    const d = item.dados;

    const dia2 = item.menorInicio ? String(item.menorInicio.getDate()).padStart(2, '0') : '-';
    const mes2 = item.menorInicio ? MESES_ABREV[item.menorInicio.getMonth()] : '';

    const linhasTarefas = item.tarefas.map(t => `
      <div class="subtitulo2">${t.Nome}${t.Subgrupo ? ' <span style="color:var(--text-soft); font-weight:400;">(' + t.Subgrupo + ')</span>' : ''}
        <span style="color:var(--text-soft); font-family:'IBM Plex Sans',sans-serif; font-weight:400;">
          — previsto ${t.TotalPrevisto}${t.Unidade}
        </span>
      </div>
    `).join('');

    const card = document.createElement("div");
    card.className = "agendaItem";

    card.innerHTML = `
      <div class="agendaData">
        <div class="dia2">${dia2}</div>
        <div class="mes2">${mes2}</div>
      </div>
      <div class="agendaBody">
        <div class="titulo2">${formatarTitulo(d.Nome)}</div>
        <div class="agendaRow" style="margin-bottom:8px;">
          Início ${item.menorInicio ? formatarDataCurta(item.menorInicio) : "-"} ·
          Término ${item.maiorTermino ? formatarDataCurta(item.maiorTermino) : "-"}
        </div>
        ${linhasTarefas}
        <span class="agendaVerMais">Ver mais →</span>
      </div>
    `;

    card.onclick = () => abrirDetalheSemana(d);

    listaContainer.appendChild(card);
  });
}

function criarBloco(s, titulo) {

  if (!s) return "";

  let html = '<div class="bloco">';
  html += '<div class="tituloBloco">' + titulo + '</div>';

  if (s["Data Prevista"]) html += '<p>' + s["Data Prevista"] + '</p>';
  if (s.Total) html += '<p><b>Total:</b> ' + s.Total + '</p>';
  if (s["Avanço"]) html += '<p><b>Avanço:</b> ' + s["Avanço"] + '</p>';

  if (s.Situacao) html += '<p class="situacao">' + s.Situacao + '</p>';

  if (s.Inicio) html += '<p>' + s.Inicio + '</p>';
  if (s.Previsto) html += '<p>' + s.Previsto + '</p>';
  if (s.Realizado) html += '<p>' + s.Realizado + '</p>';

  if (s.Grafico && s.Grafico.startsWith("http"))
    html += '<img src="' + s.Grafico + '">';

  if (s.Imagem1 && s.Imagem1.startsWith("http"))
    html += '<img src="' + s.Imagem1 + '">';

  if (s.Imagem2 && s.Imagem2.startsWith("http"))
    html += '<img src="' + s.Imagem2 + '">';

  if (s.Imagem3 && s.Imagem3.startsWith("http"))
    html += '<img src="' + s.Imagem3 + '">';

  html += '</div>';

  return html;
}

function formatarTitulo(texto) {
  if (!texto) return texto;
  const preposicoes = ['de', 'da', 'do', 'das', 'dos', 'e'];
  return texto.trim().toLowerCase().split(' ').map((palavra, i) => {
    if (/\d/.test(palavra)) return palavra.toUpperCase();
    if (palavra.length <= 3 && !/[aeiouáéíóúãõâêôàü]/.test(palavra)) return palavra.toUpperCase();
    if (i > 0 && preposicoes.includes(palavra)) return palavra;
    return palavra.charAt(0).toUpperCase() + palavra.slice(1);
  }).join(' ');
}

// ✅ converte "dd/MM" (formato salvo pelo script) em Date, usando o ano atual
function parseDiaMes(str) {
  if (!str) return null;
  const partes = str.split('/');
  if (partes.length !== 2) return null;
  const dia = parseInt(partes[0]);
  const mes = parseInt(partes[1]) - 1;
  if (isNaN(dia) || isNaN(mes)) return null;
  return new Date(new Date().getFullYear(), mes, dia);
}

function formatarData(dataStr) {

  if (!dataStr) return { dia: "-", mes: "-", diaSemana: "-" };

  // ✅ quebra DD-MM-YYYY
  const partes = dataStr.split("-");

  const dia = parseInt(partes[0]);
  const mesIndex = parseInt(partes[1]) - 1;
  const ano = parseInt(partes[2]);

  const data = new Date(ano, mesIndex, dia);

  const meses = ["JAN","FEV","MAR","ABR","MAI","JUN",
                 "JUL","AGO","SET","OUT","NOV","DEZ"];

  const dias = ["DOM","SEG","TER","QUA","QUI","SEX","SAB"];

  return {
    dia: dia,
    mes: meses[mesIndex],
    diaSemana: dias[data.getDay()]
  };
}

  const atualizacoes = [];
  snap.forEach(doc => {

  const snap = await db.collection("Notificacoes").get();

// ✅ 2. LIMPA AS ANTIGAS

const limiteData = new Date();

function statusRealizado(etapa) {
  if (!etapa.InicioRealizado) return 'ainda não iniciado';

  const periodo = `${etapa.InicioRealizado} até ${etapa.TerminoRealizado || '-'}`;

  const totalPrevisto = etapa.TotalPrevisto || 0;
  const totalRealizado = etapa.TotalRealizado || 0;

  // ✅ considera concluído quando o realizado alcança (ou passa) o
  // total previsto — com uma margem pequena pra arredondamento
  if (totalPrevisto > 0 && totalRealizado >= totalPrevisto - 0.05) {
    return `${periodo} — concluído`;
  }

  return `${periodo} — em andamento`;
}

// ✅ GRÁFICO DE GANTT — todas as frentes, todas as tarefas com data prevista
function abrirGantt() {

  esconderTelasPrincipais();
  document.getElementById("telaGantt").style.display = "block";

  const container = document.getElementById("conteudoGantt");
  const frentes = window.todasFrentesSemanas || [];

  // ✅ achata todas as tarefas de todas as frentes numa lista só
  const tarefas = [];
  frentes.forEach(frente => {
    (frente.Tarefas || []).forEach(t => {
      const inicio = parseDiaMes(t.InicioPrevisto);
      if (!inicio) return;
      let termino = parseDiaMes(t.TerminoPrevisto) || inicio;
      if (termino < inicio) termino = inicio;
      tarefas.push({
        frente: formatarTitulo(frente.Nome),
        topico: t.Topico || '',
        nome: t.Nome,
        inicio, termino,
      });
    });
  });

  if (tarefas.length === 0) {
    container.innerHTML = '<p style="font-family:\'IBM Plex Sans\',sans-serif; font-size:13px; color:var(--text-soft); padding:20px;">Nenhuma tarefa com data prevista encontrada.</p>';
    return;
  }

  const minDate = new Date(Math.min(...tarefas.map(t => t.inicio)));
  const maxDate = new Date(Math.max(...tarefas.map(t => t.termino)));
  const totalDias = Math.max(1, Math.round((maxDate - minDate) / 86400000) + 1);

  // ✅ agrupa por frente, mantendo a ordem em que apareceram
  const porFrente = {};
  tarefas.forEach(t => {
    if (!porFrente[t.frente]) porFrente[t.frente] = [];
    porFrente[t.frente].push(t);
  });

  const pctPorDia = dia => (dia / totalDias) * 100;

  const MESES_EIXO = ['jan','fev','mar','abr','mai','jun',
    'jul','ago','set','out','nov','dez'];

  // ✅ eixo: só marca o INÍCIO DE CADA MÊS (bem mais espaçado que
  // marcar cada semana — evita as datas ficarem grudadas)
  const marcasMes = [];
  let cursorMes = new Date(minDate.getFullYear(), minDate.getMonth(), 1);
  if (cursorMes < minDate) cursorMes.setMonth(cursorMes.getMonth() + 1);
  while (cursorMes <= maxDate) {
    marcasMes.push(new Date(cursorMes));
    cursorMes.setMonth(cursorMes.getMonth() + 1);
  }
  // garante que o próprio início do período também apareça marcado
  if (marcasMes.length === 0 || marcasMes[0].getTime() !== minDate.getTime()) {
    marcasMes.unshift(new Date(minDate));
  }

  let eixoHtml = '';
  marcasMes.forEach(dt => {
    const offsetDias = Math.round((dt - minDate) / 86400000);
    const left = pctPorDia(offsetDias);
    eixoHtml += `
      <div class="ganttMarcaMes" style="left:${left}%;">${dt.getDate()} ${MESES_EIXO[dt.getMonth()]}</div>
    `;
  });

  let linhasHtml = `
    <div class="ganttLinhaEixo">
      <div class="ganttLabelH"></div>
      <div class="ganttTrilhaH">${eixoHtml}</div>
    </div>
  `;

  Object.keys(porFrente).forEach(nomeFrente => {
    linhasHtml += `<div class="ganttGrupoH">${nomeFrente}</div>`;

    porFrente[nomeFrente].forEach(t => {
      const offsetDias = Math.round((t.inicio - minDate) / 86400000);
      const duracaoDias = Math.round((t.termino - t.inicio) / 86400000) + 1;
      const left = pctPorDia(offsetDias);
      const width = Math.max(1.2, pctPorDia(duracaoDias));

      linhasHtml += `
        <div class="ganttLinhaH">
          <div class="ganttLabelH">
            ${t.topico ? `<span class="ganttTopico">${t.topico}</span>` : ''}
            ${t.nome}
          </div>
          <div class="ganttTrilhaH">
            <div class="ganttBarraH" style="left:${left}%; width:${width}%;"
                 title="${t.nome}: ${formatarDataCurta(t.inicio)} a ${formatarDataCurta(t.termino)}"></div>
          </div>
        </div>
      `;
    });
  });

  container.innerHTML = `<div class="ganttNovo">${linhasHtml}</div>`;
}

function formatarDataCurta(data) {
  return String(data.getDate()).padStart(2, '0') + '/' + String(data.getMonth() + 1).padStart(2, '0');
}

// ✅ BUSCA INTELIGENTE — reconhece perguntas específicas sobre a planilha
// de Próximas Semanas (sem usar nenhuma IA, é tudo filtro direto)
function normalizarTexto(t) {
  return String(t || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

// ✅ segunda a sábado de uma semana — deslocamento 0 = semana atual,
// 1 = semana que vem, -1 = semana passada. Usado nas perguntas de
// PLANEJAMENTO ("o que está previsto"), que devem mostrar a semana
// inteira mesmo que alguns dias ainda não tenham chegado.
function calcularSemanaCompleta(hoje, deslocamentoSemanas) {
  const diaSemana = (hoje.getDay() + 6) % 7; // 0 = segunda-feira
  const segunda = new Date(hoje);
  segunda.setDate(segunda.getDate() - diaSemana + deslocamentoSemanas * 7);
  const sabado = new Date(segunda);
  sabado.setDate(sabado.getDate() + 5);
  return { inicio: segunda, fim: sabado };
}

// ✅ 1º ao último dia de um mês — deslocamento 0 = mês atual, 1 = mês
// que vem. Mesma ideia da semana completa, mas pra "o que está
// previsto pro próximo mês".
function calcularMesCompleto(hoje, deslocamentoMeses) {
  const inicio = new Date(hoje.getFullYear(), hoje.getMonth() + deslocamentoMeses, 1);
  const fim = new Date(hoje.getFullYear(), hoje.getMonth() + deslocamentoMeses + 1, 0);
  return { inicio, fim };
}

function mostrarSugestoes(sufixo) {
  const input = document.getElementById('inputBusca' + sufixo);
  const container = document.getElementById('sugestoesBusca' + sufixo);
  const lista = sufixo === 'F' ? SUGESTOES_BUSCA_F : SUGESTOES_BUSCA_S;
  const termo = normalizarTexto(input.value.trim());

  const filtradas = termo
    ? lista.filter(s => normalizarTexto(s).includes(termo))
    : lista;

  if (filtradas.length === 0) {
    container.style.display = 'none';
    return;
  }

  container.innerHTML = filtradas.map(s =>
    `<div class="sugestaoItem" data-completo="${s.replace(/"/g, '&quot;')}" onmousedown="selecionarSugestao('${sufixo}', this)">${s}</div>`
  ).join('');
  container.style.display = 'block';
}

// ✅ [frente] mostra a lista de frentes acompanhadas; [data] abre o
// calendário (uma ou duas datas, dependendo de quantas aparecerem)
async function selecionarSugestao(sufixo, el) {
  const textoCompleto = el.dataset.completo;
  const input = document.getElementById('inputBusca' + sufixo);
  input.value = textoCompleto;

  if (textoCompleto.includes('[frente]')) {
    await mostrarListaFrentes(sufixo);
  } else if (textoCompleto.includes('[data]')) {
    const qtdDatas = (textoCompleto.match(/\[data\]/g) || []).length;
    abrirCalendario(sufixo, qtdDatas > 1);
  } else {
    document.getElementById('sugestoesBusca' + sufixo).style.display = 'none';
  }
}

// ✅ depois de escolher um template com [frente], mostra as frentes que
// já estão sendo acompanhadas, pra completar com um clique
async function mostrarListaFrentes(sufixo) {
  if (timeoutsSugestoes[sufixo]) clearTimeout(timeoutsSugestoes[sufixo]);
  const container = document.getElementById('sugestoesBusca' + sufixo);
  container.innerHTML = `<div style="padding:10px 14px; font-size:11.5px; color:var(--text-soft);">Carregando frentes...</div>`;
  container.style.display = 'block';

  let nomes = [];
  try {
    const snap = await db.collection('Frentes').get();
    snap.forEach(doc => nomes.push(formatarTitulo(doc.data().Nome)));
  } catch (e) { /* ignora */ }

  if (timeoutsSugestoes[sufixo]) clearTimeout(timeoutsSugestoes[sufixo]);

  if (nomes.length === 0) {
    container.style.display = 'none';
    return;
  }

  container.innerHTML = nomes.map(n =>
    `<div class="sugestaoItem" onmousedown="completarComFrente('${sufixo}', this)">${n}</div>`
  ).join('');
  container.style.display = 'block';
}

function completarComFrente(sufixo, el) {
  if (timeoutsSugestoes[sufixo]) clearTimeout(timeoutsSugestoes[sufixo]);
  const input = document.getElementById('inputBusca' + sufixo);
  input.value = input.value.replace('[frente]', el.textContent);
  document.getElementById('sugestoesBusca' + sufixo).style.display = 'none';
  input.focus();
}

// ---------------------------------------------------------------------
// CALENDÁRIO — igual ao de reserva de viagem: mostra o mês, clica no
// primeiro dia pra marcar o início, clica de novo (numa data depois)
// pra marcar o fim (se a pergunta pedir duas datas)
// ---------------------------------------------------------------------
const MESES_NOME_CAL = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DIAS_SEMANA_CAL = ['DOM','SEG','TER','QUA','QUI','SEX','SÁB'];

function abrirCalendario(sufixo, doisCampos) {
  if (timeoutsSugestoes[sufixo]) clearTimeout(timeoutsSugestoes[sufixo]);
  const hoje = new Date();
  calendarioEstado[sufixo] = {
    mesAtual: hoje.getMonth(),
    anoAtual: hoje.getFullYear(),
    inicio: null,
    fim: null,
    doisCampos,
  };
  renderizarCalendario(sufixo);
}

function renderizarCalendario(sufixo) {
  const estado = calendarioEstado[sufixo];
  const container = document.getElementById('sugestoesBusca' + sufixo);

  const primeiroDiaMes = new Date(estado.anoAtual, estado.mesAtual, 1);
  const diaSemanaInicio = primeiroDiaMes.getDay();
  const diasNoMes = new Date(estado.anoAtual, estado.mesAtual + 1, 0).getDate();

  let celulas = '';
  for (let i = 0; i < diaSemanaInicio; i++) {
    celulas += `<div class="calDiaVazio"></div>`;
  }
  for (let dia = 1; dia <= diasNoMes; dia++) {
    const dataAtual = new Date(estado.anoAtual, estado.mesAtual, dia);
    let classe = 'calDia';
    if (estado.inicio && dataAtual.getTime() === estado.inicio.getTime()) classe += ' calDiaSelecionado';
    if (estado.fim && dataAtual.getTime() === estado.fim.getTime()) classe += ' calDiaSelecionado';
    if (estado.inicio && estado.fim && dataAtual > estado.inicio && dataAtual < estado.fim) classe += ' calDiaIntervalo';
    celulas += `<div class="${classe}" onmousedown="selecionarDiaCalendario('${sufixo}', ${dia})">${dia}</div>`;
  }

  const camposHtml = estado.doisCampos ? `
    <div class="calendarioAbas">
      <div class="calendarioAba ${!estado.fim ? 'ativa' : ''}">
        <div class="calendarioAbaLabel">Início</div>
        <div class="calendarioAbaData">${estado.inicio ? formatarDataCurta(estado.inicio) : '__/__'}</div>
      </div>
      <div class="calendarioAba ${estado.inicio && !estado.fim ? 'ativa' : ''}">
        <div class="calendarioAbaLabel">Até</div>
        <div class="calendarioAbaData">${estado.fim ? formatarDataCurta(estado.fim) : '__/__'}</div>
      </div>
    </div>
  ` : '';

  container.innerHTML = `
    <div class="calendarioPopup">
      ${camposHtml}
      <div class="calendarioNav">
        <span class="calendarioSeta" onmousedown="mudarMesCalendario('${sufixo}', -1)">‹</span>
        <span class="calendarioMesAno">${MESES_NOME_CAL[estado.mesAtual]} ${estado.anoAtual}</span>
        <span class="calendarioSeta" onmousedown="mudarMesCalendario('${sufixo}', 1)">›</span>
      </div>
      <div class="calendarioSemana">
        ${DIAS_SEMANA_CAL.map(d => `<div class="calDiaSemanaLabel">${d}</div>`).join('')}
      </div>
      <div class="calendarioGrade">${celulas}</div>
    </div>
  `;
  container.style.display = 'block';
}

function mudarMesCalendario(sufixo, delta) {
  if (timeoutsSugestoes[sufixo]) clearTimeout(timeoutsSugestoes[sufixo]);
  const estado = calendarioEstado[sufixo];
  estado.mesAtual += delta;
  if (estado.mesAtual < 0) { estado.mesAtual = 11; estado.anoAtual--; }
  if (estado.mesAtual > 11) { estado.mesAtual = 0; estado.anoAtual++; }
  renderizarCalendario(sufixo);
}

function selecionarDiaCalendario(sufixo, dia) {
  if (timeoutsSugestoes[sufixo]) clearTimeout(timeoutsSugestoes[sufixo]);
  const estado = calendarioEstado[sufixo];
  const dataClicada = new Date(estado.anoAtual, estado.mesAtual, dia);

  if (!estado.doisCampos) {
    preencherDataEscolhida(sufixo, dataClicada);
    return;
  }

  if (!estado.inicio || estado.fim) {
    estado.inicio = dataClicada;
    estado.fim = null;
  } else if (dataClicada < estado.inicio) {
    estado.inicio = dataClicada;
    estado.fim = null;
  } else {
    estado.fim = dataClicada;
  }

  renderizarCalendario(sufixo);

  if (estado.inicio && estado.fim) {
    setTimeout(() => preencherIntervaloEscolhido(sufixo), 350);
  }
}

function preencherDataEscolhida(sufixo, data) {
  const input = document.getElementById('inputBusca' + sufixo);
  input.value = input.value.replace('[data]', formatarDataCurta(data));
  document.getElementById('sugestoesBusca' + sufixo).style.display = 'none';
  input.focus();
}

function preencherIntervaloEscolhido(sufixo) {
  const estado = calendarioEstado[sufixo];
  const input = document.getElementById('inputBusca' + sufixo);
  input.value = input.value
    .replace('[data]', formatarDataCurta(estado.inicio))
    .replace('[data]', formatarDataCurta(estado.fim));
  document.getElementById('sugestoesBusca' + sufixo).style.display = 'none';
  input.focus();
}

// ✅ fecha a lista/calendário só quando clicar de verdade fora da caixa
// de busca inteira — muito mais confiável do que usar blur com timeout,
// que estava fechando o calendário antes de dar tempo de escolher a data
document.addEventListener('click', function(e) {
  ['F', 'S'].forEach(sufixo => {
    const input = document.getElementById('inputBusca' + sufixo);
    if (!input) return;
    const caixa = input.closest('.caixaBusca');
    if (caixa && !caixa.contains(e.target)) {
      const el = document.getElementById('sugestoesBusca' + sufixo);
      if (el) el.style.display = 'none';
    }
  });
});

async function buscarInteligente(sufixo) {
  const input = document.getElementById('inputBusca' + sufixo).value.trim();
  const resultado = document.getElementById('resultadoBusca' + sufixo);

  if (!input) { resultado.innerHTML = ''; return; }

  resultado.innerHTML = `<span class="fecharBusca" onclick="limparBusca('${sufixo}')">×</span><p style="font-size:12px; color:var(--text-soft); text-align:left; margin-top:10px;">Buscando...</p>`;

  const termo = normalizarTexto(input);
  const hoje = new Date();
  hoje.setHours(0, 0, 0, 0); // ✅ zera a hora — sem isso, comparar "segunda às 14h" com "segunda à meia-noite" excluía a segunda-feira dos intervalos de semana

  // ✅ extrai um período mencionado na pergunta: um dia específico
  // ("ontem", "hoje", "amanhã", dd/mm) ou um intervalo ("semana passada")
  function extrairPeriodo() {
    const mUltimosDias = termo.match(/ultimos?\s+(\d+)\s+dias?/);
    if (mUltimosDias) {
      const n = parseInt(mUltimosDias[1]);
      const inicio = new Date(hoje);
      inicio.setDate(inicio.getDate() - (n - 1));
      return { tipo: 'intervalo', inicio, fim: hoje, rotulo: `os últimos ${n} dias` };
    }
    if (termo.includes('semana passada') || termo.includes('ultima semana') || termo.includes('última semana')) {
      const fim = new Date(hoje);
      fim.setDate(fim.getDate() - 1);
      const inicio = new Date(hoje);
      inicio.setDate(inicio.getDate() - 7);
      return { tipo: 'intervalo', inicio, fim, rotulo: 'semana passada' };
    }
    if (termo.includes('essa semana') || termo.includes('esta semana')) {
      const diaSemana = (hoje.getDay() + 6) % 7; // 0 = segunda-feira
      const inicio = new Date(hoje);
      inicio.setDate(inicio.getDate() - diaSemana);
      return { tipo: 'intervalo', inicio, fim: hoje, rotulo: 'essa semana' };
    }
    if (termo.includes('esse ano') || termo.includes('este ano')) {
      const inicio = new Date(hoje.getFullYear(), 0, 1);
      return { tipo: 'intervalo', inicio, fim: hoje, rotulo: 'esse ano' };
    }
    if (termo.includes('esse mes') || termo.includes('este mes')) {
      const inicio = new Date(hoje.getFullYear(), hoje.getMonth(), 1);
      return { tipo: 'intervalo', inicio, fim: hoje, rotulo: 'esse mês' };
    }
    if (termo.includes('mes passado')) {
      const mesAtual = hoje.getMonth();
      const anoRef = mesAtual === 0 ? hoje.getFullYear() - 1 : hoje.getFullYear();
      const mesRef = mesAtual === 0 ? 11 : mesAtual - 1;
      const inicio = new Date(anoRef, mesRef, 1);
      const fim = new Date(anoRef, mesRef + 1, 0);
      return { tipo: 'intervalo', inicio, fim, rotulo: 'mês passado' };
    }
    if (termo.includes('ano passado')) {
      const anoRef = hoje.getFullYear() - 1;
      const inicio = new Date(anoRef, 0, 1);
      const fim = new Date(anoRef, 11, 31);
      return { tipo: 'intervalo', inicio, fim, rotulo: 'ano passado' };
    }
    const MESES_NOMES = ['janeiro','fevereiro','marco','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
    for (let i = 0; i < MESES_NOMES.length; i++) {
      if (termo.includes(MESES_NOMES[i])) {
        const inicio = new Date(hoje.getFullYear(), i, 1);
        const fim = new Date(hoje.getFullYear(), i + 1, 0);
        return { tipo: 'intervalo', inicio, fim, rotulo: `em ${MESES_NOMES[i]}` };
      }
    }
    if (termo.includes('ontem')) {
      const ontem = new Date(hoje);
      ontem.setDate(ontem.getDate() - 1);
      return { tipo: 'dia', data: ontem, rotulo: 'ontem' };
    }
    if (termo.includes('amanha')) {
      const amanha = new Date(hoje);
      amanha.setDate(amanha.getDate() + 1);
      return { tipo: 'dia', data: amanha, rotulo: 'amanhã' };
    }
    // ✅ intervalo explícito: "do dia 06/07 até o dia 08/07" (ou variações
    // como "de 06/07 a 08/07", "entre 06/07 e 08/07") — precisa vir antes
    // do reconhecimento de uma data única, senão ela pega só a primeira
    const mIntervalo = termo.match(/(\d{1,2})[\/\-](\d{1,2}).*?\b(?:ate|a|e)\b.*?(\d{1,2})[\/\-](\d{1,2})/);
    if (mIntervalo) {
      const dia1 = parseInt(mIntervalo[1]), mes1 = parseInt(mIntervalo[2]);
      const dia2 = parseInt(mIntervalo[3]), mes2 = parseInt(mIntervalo[4]);
      const inicio = new Date(hoje.getFullYear(), mes1 - 1, dia1);
      const fim = new Date(hoje.getFullYear(), mes2 - 1, dia2);
      const rotuloIni = `${String(dia1).padStart(2,'0')}/${String(mes1).padStart(2,'0')}`;
      const rotuloFim = `${String(dia2).padStart(2,'0')}/${String(mes2).padStart(2,'0')}`;
      return { tipo: 'intervalo', inicio, fim, rotulo: `de ${rotuloIni} até ${rotuloFim}` };
    }
    const m = termo.match(/(\d{1,2})[\/\-](\d{1,2})/);
    if (m) {
      const dia = parseInt(m[1]);
      const mes = parseInt(m[2]);
      const d = new Date(hoje.getFullYear(), mes - 1, dia);
      return { tipo: 'dia', data: d, rotulo: `o dia ${String(dia).padStart(2,'0')}/${String(mes).padStart(2,'0')}` };
    }
    if (termo.includes('hoje')) {
      return { tipo: 'dia', data: hoje, rotulo: 'hoje' };
    }
    return null;
  }

  let html = '';

  const perguntaUltimaDetonacao = termo.includes('ultima detonac') || termo.includes('ultimo fogo') || termo.includes('ultima vez que detonou');
  const perguntaDetonouFrente = termo.includes('detonou');
  const perguntaTotalFogos = termo.includes('quantos fogos') || termo.includes('ao todo') ||
    termo.includes('total de detonac') || termo.includes('total de fogos');
  const perguntaContagemDetonacao = !perguntaUltimaDetonacao && !perguntaDetonouFrente && !perguntaTotalFogos &&
    termo.includes('detonac') && (termo.includes('quantas') || termo.includes('quantos'));
  const perguntaDetonacao = !perguntaUltimaDetonacao && !perguntaDetonouFrente && !perguntaTotalFogos &&
    !perguntaContagemDetonacao && termo.includes('detonac');
  const perguntaTermino = termo.includes('termina') || termo.includes('terminar') || termo.includes('conclu');
  const perguntaMediaDiaria = termo.includes('media');
  const perguntaMaiorAvanco = termo.includes('maior avanco') || (termo.includes('maior') && termo.includes('avanco'));
  const perguntaDiasSemAvanco = termo.includes('sem avanco') || termo.includes('dias parados') || termo.includes('dias parado');
  const perguntaTotalAvancoPeriodo = !perguntaMediaDiaria && !perguntaMaiorAvanco && !perguntaDiasSemAvanco &&
    termo.includes('avanco') && termo.includes('quanto') &&
    (termo.includes('mes') || termo.includes('semana') || termo.includes('ano') || termo.includes('dias'));
  const perguntaObservacaoDia = termo.includes('o que aconteceu') || termo.includes('aconteceu em') || termo.includes('aconteceu na') || termo.includes('aconteceu no');
  const perguntaAvancoData = !perguntaTotalAvancoPeriodo && !perguntaMediaDiaria &&
    !perguntaMaiorAvanco && !perguntaDiasSemAvanco && !perguntaObservacaoDia &&
    termo.includes('avanco') && extrairPeriodo();
  // ✅ vira o "padrão" de qualquer pergunta de avanço que não se encaixe
  // em nenhum caso mais específico acima — cobre frases tipo "quanto de
  // avanço tem a frente X" (sem período nem "total" explícito)
  const perguntaAvancoTotalGeral = !perguntaMediaDiaria && !perguntaMaiorAvanco && !perguntaDiasSemAvanco &&
    !perguntaTotalAvancoPeriodo && !perguntaAvancoData &&
    termo.includes('avanco');
  const perguntaQuantidadeTotalTarefa = termo.includes('quantidade total') || termo.includes('total geral');
  const perguntaComprimentoTotal = !perguntaQuantidadeTotalTarefa && (termo.includes('comprimento') || termo.includes('quanto mede') ||
    (termo.includes('total') && !perguntaAvancoData && !perguntaTotalAvancoPeriodo && !perguntaAvancoTotalGeral));
  const perguntaPk = /\bpk\b/.test(termo);
  const perguntaObservacaoFrente = !perguntaObservacaoDia && (termo.includes('observacao') || termo.includes('informacao adicional') || termo.includes('informacoes adicionais'));
  const perguntaFrenteMaisAtrasada = termo.includes('mais atrasad');
  const perguntaFrentesAtrasadas = !perguntaFrenteMaisAtrasada && termo.includes('atrasad');
  const perguntaProgressoGeral = termo.includes('progresso') || termo.includes('percentual');
  const mIntervalo = termo.match(/(\d{1,2})[\/\-](\d{1,2}).*?\b(?:ate|a|e)\b.*?(\d{1,2})[\/\-](\d{1,2})/);
  const matchData = termo.match(/(\d{1,2})[\/\-](\d{1,2})/);

  if (perguntaUltimaDetonacao) {
    html = await montarRespostaUltimaDetonacao(termo);

  } else if (perguntaDetonouFrente) {
    const periodo = extrairPeriodo() || { tipo: 'dia', data: hoje, rotulo: 'hoje' };
    html = await montarRespostaDetonouFrente(termo, periodo);

  } else if (perguntaTotalFogos) {
    html = await montarRespostaTotalFogos();

  } else if (perguntaContagemDetonacao) {
    const periodo = extrairPeriodo() || { tipo: 'dia', data: hoje, rotulo: 'hoje' };
    html = await montarRespostaContagemDetonacoes(periodo);

  } else if (perguntaDetonacao) {
    const periodo = extrairPeriodo();
    const infoData = (periodo && periodo.tipo === 'dia') ? periodo : { data: hoje, rotulo: 'hoje' };
    html = await montarRespostaDetonacoes(infoData.data, infoData.rotulo);

  } else if (perguntaTermino) {
    html = await montarRespostaTermino(termo);

  } else if (perguntaMediaDiaria) {
    html = await montarRespostaMediaDiaria(termo);

  } else if (perguntaMaiorAvanco) {
    html = await montarRespostaMaiorAvanco(termo);

  } else if (perguntaDiasSemAvanco) {
    const periodo = extrairPeriodo() || { tipo: 'intervalo', inicio: hoje, fim: hoje, rotulo: 'hoje' };
    html = await montarRespostaDiasSemAvanco(termo, periodo);

  } else if (perguntaAvancoTotalGeral) {
    html = await montarRespostaAvancoTotalGeral(termo);

  } else if (perguntaTotalAvancoPeriodo) {
    const periodo = extrairPeriodo() || { tipo: 'intervalo', inicio: hoje, fim: hoje, rotulo: 'hoje' };
    html = await montarRespostaTotalAvancoPeriodo(termo, periodo);

  } else if (perguntaObservacaoDia) {
    const periodo = extrairPeriodo() || { tipo: 'dia', data: hoje, rotulo: 'hoje' };
    html = await montarRespostaObservacaoDia(termo, periodo);

  } else if (perguntaAvancoData) {
    html = await montarRespostaAvancoData(termo, perguntaAvancoData);

  } else if (perguntaPk) {
    html = await montarRespostaPk(termo);

  } else if (perguntaObservacaoFrente) {
    html = await montarRespostaObservacaoFrente(termo);

  } else if (perguntaQuantidadeTotalTarefa) {
    html = await montarRespostaQuantidadeTotal(termo);

  } else if (perguntaComprimentoTotal) {
    html = await montarRespostaComprimentoTotal(termo);

  } else if (perguntaFrenteMaisAtrasada) {
    html = await montarRespostaFrenteMaisAtrasada();

  } else if (perguntaFrentesAtrasadas) {
    html = await montarRespostaAtraso(termo);

  } else if (perguntaProgressoGeral) {
    html = await montarRespostaProgressoGeral(termo);

  } else if (termo.includes('hoje')) {
    const snap = await db.collection('ProximasSemanas').get();
    const frentes = [];
    snap.forEach(doc => frentes.push(doc.data()));
    html = montarRespostaPorData(frentes, formatarDataCurta(hoje), 'hoje');

  } else if (termo.includes('amanha')) {
    const snap = await db.collection('ProximasSemanas').get();
    const frentes = [];
    snap.forEach(doc => frentes.push(doc.data()));
    const amanha = new Date(hoje);
    amanha.setDate(amanha.getDate() + 1);
    html = montarRespostaPorData(frentes, formatarDataCurta(amanha), 'amanhã');

  } else if (mIntervalo) {
    // ✅ "o que está previsto do dia X até o dia Y" — intervalo explícito
    const snap = await db.collection('ProximasSemanas').get();
    const frentes = [];
    snap.forEach(doc => frentes.push(doc.data()));
    html = montarRespostaPeriodoSemanas(frentes, extrairPeriodo());

  } else if (matchData) {
    const snap = await db.collection('ProximasSemanas').get();
    const frentes = [];
    snap.forEach(doc => frentes.push(doc.data()));
    const dia = matchData[1].padStart(2, '0');
    const mes = matchData[2].padStart(2, '0');
    html = montarRespostaPorData(frentes, `${dia}/${mes}`, `o dia ${dia}/${mes}`);

  } else if (termo.includes('semana passada')) {
    const snap = await db.collection('ProximasSemanas').get();
    const frentes = [];
    snap.forEach(doc => frentes.push(doc.data()));
    html = montarRespostaPeriodoSemanas(frentes, extrairPeriodo());

  } else if (termo.includes('mes que vem') || termo.includes('proximo mes') || termo.includes('próximo mês')) {
    // ✅ próximo mês = 1º ao último dia do mês seguinte, completo
    const snap = await db.collection('ProximasSemanas').get();
    const frentes = [];
    snap.forEach(doc => frentes.push(doc.data()));
    const { inicio, fim } = calcularMesCompleto(hoje, 1);
    html = montarRespostaPeriodoSemanas(frentes, { tipo: 'intervalo', inicio, fim, rotulo: 'o próximo mês' });

  } else if (termo.includes('semana que vem') || termo.includes('proxima semana') || termo.includes('próxima semana')) {
    // ✅ próxima semana = segunda a sábado da semana seguinte (não é
    // "próximos 7 dias" — é a semana de calendário completa)
    const snap = await db.collection('ProximasSemanas').get();
    const frentes = [];
    snap.forEach(doc => frentes.push(doc.data()));
    const { inicio, fim } = calcularSemanaCompleta(hoje, 1);
    html = montarRespostaPeriodoSemanas(frentes, { tipo: 'intervalo', inicio, fim, rotulo: 'a semana que vem' });

  } else if (termo.includes('essa semana') || termo.includes('esta semana')) {
    // ✅ essa semana = segunda a sábado da semana atual INTEIRA (mesmo
    // que ainda não tenha chegado nesses dias) — diferente da versão
    // usada pra contar avanço/detonação, que para em hoje
    const snap = await db.collection('ProximasSemanas').get();
    const frentes = [];
    snap.forEach(doc => frentes.push(doc.data()));

// ✅ "quais detonações tivemos [ontem/hoje/em dd/mm]" — cruza a aba de
// sismografia (evento + descrição) com o avanço diário de cada frente
// (pra saber qual frente/etapa teve avanço naquele dia, com PK e observação)
async function montarRespostaDetonacoes(data, rotulo) {
  const dataStr = formatarDataCurta(data);

  let detonacoesDoDia = [];
  try {
    const doc = await db.collection('Config').doc('Detonacoes').get();
    if (doc.exists) {
      const eventos = doc.data().Eventos || [];
      detonacoesDoDia = eventos.filter(e => e.Data === dataStr);
    }
  } catch (e) { /* sem detonações cadastradas ainda */ }

  const snapFrentes = await db.collection('Frentes').get();
  const avancosDoDia = [];
  snapFrentes.forEach(doc => {
    const f = doc.data();
    (f.AvancoPorEtapa || []).forEach(et => {
      (et.Dias || []).forEach(dia => {
        if (dia.Data === dataStr && dia.DiarioRealizado !== null && dia.DiarioRealizado !== undefined && dia.DiarioRealizado > 0) {
          avancosDoDia.push({
            frente: formatarTitulo(f.Nome), etapa: et.Etapa,
            pkInicial: dia.PkInicial, pkFinal: dia.PkFinal,
            avanco: dia.DiarioRealizado, observacao: dia.Observacoes,
          });
        }
      });
    });
  });

  if (detonacoesDoDia.length === 0 && avancosDoDia.length === 0) {
    return `<p style="font-size:13px; color:var(--text-soft); text-align:left; margin-top:10px;">Não encontrei detonações nem avanço registrado para ${rotulo} (${dataStr}).</p>`;
  }

  let html = `<div style="font-size:12px; color:var(--text-soft); margin:10px 0 8px; text-align:left;">Detonações em ${rotulo} (${dataStr}):</div>`;

  if (detonacoesDoDia.length > 0) {
    detonacoesDoDia.forEach(e => {
      html += `<div class="subtitulo2">Evento ${e.Evento}: <span style="color:var(--ink); font-weight:400; font-family:'IBM Plex Sans',sans-serif;">${e.Descricao || '-'}</span></div>`;
    });
  } else {
    html += `<div style="font-size:12px; color:var(--text-soft); margin-bottom:8px;">Nenhum evento de detonação cadastrado nesse dia.</div>`;
  }

  if (avancosDoDia.length > 0) {
    html += `<div style="font-size:12px; color:var(--text-soft); margin:12px 0 8px;">Avanço registrado nesse dia:</div>`;
    avancosDoDia.forEach(a => {
      html += `<div class="subtitulo2">${a.frente} — ${a.etapa}: PK ${a.pkInicial || '-'} a ${a.pkFinal || '-'}, avanço <b>${a.avanco}m</b>${a.observacao ? ' · ' + a.observacao : ''}</div>`;
    });
  }

  return html;
}

// ✅ busca as variações de descrição conhecidas pra uma frente (vindas
// da aba "Correlações - Frentes x Det." da planilha) — cobre casos em

async function buscarCorrelacoesDaFrente(nomeFrente) {

// ✅ tira palavras genéricas ("frente", "de", "da"...) pra sobrar só as
// palavras que realmente identificam o lugar
function extrairPalavrasChave(texto) {
  const normalizado = normalizarTexto(texto);
  const ignoradas = ['frente', 'de', 'da', 'do', 'e', 'a', 'o', 'para', 'no', 'na'];
  return normalizado.split(/[\s\-\/]+/).filter(p => p.length > 2 && !ignoradas.includes(p));
}

// ✅ a descrição do evento "bate" com a frente se TODAS as palavras-chave
// de PELO MENOS UMA das variações conhecidas aparecem nela
function descricaoBateComVariantes(descricaoEvento, variantes) {
  const descNorm = normalizarTexto(descricaoEvento);
  return variantes.some(variante => {
    const palavras = extrairPalavrasChave(variante);
    if (palavras.length === 0) return false;
    return palavras.every(p => descNorm.includes(p));
  });
}

// ✅ "quantas detonações tivemos essa semana/esse mês/esse ano" —
// conta os eventos dentro do período, sem precisar de uma frente
// ✅ acha a data mais recente preenchida na sismografia — usado pra
// avisar até quando os dados estão atualizados, já que a planilha pode
// ainda não ter os dias mais recentes lançados
function ultimaDataPreenchidaDetonacoes(eventos) {
  let maisRecente = null;
  eventos.forEach(e => {
    const d = parseDiaMes(e.Data);
    if (d && (!maisRecente || d > maisRecente)) maisRecente = d;
  });
  return maisRecente ? formatarDataCurta(maisRecente) : null;
}

async function montarRespostaContagemDetonacoes(periodo) {
  let eventos = [];
  try {
    const doc = await db.collection('Config').doc('Detonacoes').get();
    if (doc.exists) eventos = doc.data().Eventos || [];
  } catch (e) { /* sem detonações cadastradas ainda */ }

  function noPeriodo(diaStr) {
    if (periodo.tipo === 'dia') return diaStr === formatarDataCurta(periodo.data);
    const d = parseDiaMes(diaStr);
    return d && d >= periodo.inicio && d <= periodo.fim;
  }

  const noIntervalo = eventos.filter(e => noPeriodo(e.Data));
  const ultimaData = ultimaDataPreenchidaDetonacoes(eventos);
  const notaData = ultimaData ? `<div style="font-size:11px; color:var(--text-soft); margin-top:8px;">(sismografia preenchida até ${ultimaData})</div>` : '';

  if (noIntervalo.length === 0) {
    return `<p style="font-size:13px; color:var(--text-soft); text-align:left; margin-top:10px;">Não encontrei detonações registradas em ${periodo.rotulo}.</p>${notaData}`;
  }

  // ✅ conta por número de fogo distinto, não por linha (o mesmo fogo
  // pode ter mais de um registro)
  const fogosUnicos = new Set(noIntervalo.map(e => e.Evento));

  let html = `<div style="font-size:13px; color:var(--ink); font-weight:600; margin:10px 0 8px; text-align:left;">Tivemos <b>${fogosUnicos.size}</b> detonação(ões) em ${periodo.rotulo}:</div>`;
  noIntervalo.forEach(e => {
    html += `<div class="subtitulo2">${e.Data} — Fogo ${e.Evento}: <span style="color:var(--ink); font-weight:400; font-family:'IBM Plex Sans',sans-serif;">${e.Descricao || '-'}</span></div>`;
  });
  html += notaData;
  return html;
}

// ✅ "quantos fogos tivemos ao todo" — o total é o MAIOR número de

// contagem de linhas/entradas

  let eventos = [];

// ✅ "qual a média de avanço diário do [frente]" — média só dos dias

async function montarRespostaMediaDiaria(termo) {

// ✅ "qual dia tivemos o maior avanço" — com frente específica, olha só
// ela; sem frente, procura o recorde em todas
async function montarRespostaMaiorAvanco(termo) {
  const frenteEspecifica = await acharFrentePorNome(termo);

  let melhor = null;
  function considerar(nomeFrente, avancoPorEtapa) {
    (avancoPorEtapa || []).forEach(et => {
      (et.Dias || []).forEach(d => {
        if (d.DiarioRealizado !== null && d.DiarioRealizado !== undefined && (!melhor || d.DiarioRealizado > melhor.avanco)) {
          melhor = { frente: formatarTitulo(nomeFrente), etapa: et.Etapa, data: d.Data, avanco: d.DiarioRealizado, obs: d.Observacoes };
        }
      });
    });
  }

  if (frenteEspecifica) {
    considerar(frenteEspecifica.Nome, frenteEspecifica.AvancoPorEtapa);
  } else {
    const snap = await db.collection('Frentes').get();
    snap.forEach(doc => {
      const f = doc.data();
      considerar(f.Nome, f.AvancoPorEtapa);
    });

    return `<p style="font-size:13px; color:var(--text-soft); text-align:left; margin-top:10px;">Não encontrei nenhum avanço registrado.</p>`;
  }

  return `<div style="font-size:13px; color:var(--ink); text-align:left; margin-top:10px;">Maior avanço registrado: <b>${melhor.frente}</b> — ${melhor.etapa} em ${melhor.data}: <b>${melhor.avanco}m</b>${melhor.obs ? ' · ' + melhor.obs : ''}</div>`;
}

// ✅ "quantos dias sem avanço tivemos essa semana/mês" — compara o
// total de dias do período com os dias que tiveram algum avanço
async function montarRespostaDiasSemAvanco(termo, periodo) {
  const frente = await acharFrentePorNome(termo);
  if (!frente) {
    return `<p style="font-size:13px; color:var(--text-soft); text-align:left; margin-top:10px;">Não identifiquei de qual frente você está falando.</p>`;
  }

  const inicio = periodo.tipo === 'dia' ? periodo.data : periodo.inicio;
  const fim = periodo.tipo === 'dia' ? periodo.data : periodo.fim;

  function noPeriodo(diaStr) {
    if (periodo.tipo === 'dia') return diaStr === formatarDataCurta(periodo.data);
    const d = parseDiaMes(diaStr);
    return d && d >= periodo.inicio && d <= periodo.fim;
  }

  const diasComAvanco = new Set();
  (frente.AvancoPorEtapa || []).forEach(et => {
    (et.Dias || []).forEach(d => {
      if (noPeriodo(d.Data) && d.DiarioRealizado !== null && d.DiarioRealizado !== undefined && d.DiarioRealizado > 0) {
        diasComAvanco.add(d.Data);
      }
    });
  });

  const totalDias = Math.round((fim - inicio) / (1000 * 60 * 60 * 24)) + 1;
  const diasSemAvanco = Math.max(totalDias - diasComAvanco.size, 0);

  return `<div style="font-size:13px; color:var(--ink); text-align:left; margin-top:10px;">${formatarTitulo(frente.Nome)} — ${periodo.rotulo}: <b>${diasSemAvanco}</b> dia(s) sem avanço registrado (de ${totalDias} dia(s) no período).</div>`;
}

}

// ✅ "quanto de avanço tivemos esse mês/essa semana no [frente]" —
// soma o avanço diário no período (sem frente, soma por todas)
async function montarRespostaTotalAvancoPeriodo(termo, periodo) {
  const frente = await acharFrentePorNome(termo);

  function noPeriodo(diaStr) {
    if (periodo.tipo === 'dia') return diaStr === formatarDataCurta(periodo.data);
    const d = parseDiaMes(diaStr);
    return d && d >= periodo.inicio && d <= periodo.fim;
  }

  function somarFrente(f) {
    let total = 0;
    let dias = 0;
    (f.AvancoPorEtapa || []).forEach(et => {
      (et.Dias || []).forEach(dia => {
        if (noPeriodo(dia.Data) && dia.DiarioRealizado !== null && dia.DiarioRealizado !== undefined && dia.DiarioRealizado > 0) {
          total += dia.DiarioRealizado;
          dias++;
        }
      });
    });
    return { total: Math.round(total * 100) / 100, dias };
  }

  if (frente) {
    const { total, dias } = somarFrente(frente);
    if (total === 0) {
      return `<p style="font-size:13px; color:var(--text-soft); text-align:left; margin-top:10px;">Não encontrei avanço registrado em ${formatarTitulo(frente.Nome)} para ${periodo.rotulo}.</p>`;
    }
    return `<div style="font-size:13px; color:var(--ink); font-weight:600; margin-top:10px; text-align:left;">${formatarTitulo(frente.Nome)} — ${periodo.rotulo}: <b>${total}m</b> de avanço (${dias} dia(s) com registro).</div>`;
  }

  const snap = await db.collection('Frentes').get();
  const itens = [];
  snap.forEach(doc => {
    const f = doc.data();
    const { total, dias } = somarFrente(f);
    if (total > 0) itens.push({ nome: formatarTitulo(f.Nome), total, dias });
  });

  if (itens.length === 0) {
    return `<p style="font-size:13px; color:var(--text-soft); text-align:left; margin-top:10px;">Não encontrei avanço registrado em nenhuma frente para ${periodo.rotulo}.</p>`;
  }

  let html = `<div style="font-size:12px; color:var(--text-soft); margin:10px 0 8px; text-align:left;">Avanço em ${periodo.rotulo}:</div>`;
  itens.forEach(i => {
    html += `<div class="subtitulo2">${i.nome}: <b>${i.total}m</b> (${i.dias} dia(s))</div>`;
  });
  return html;
}

// ✅ "qual o progresso geral do [frente]" — percentual atual vs previsto
async function montarRespostaProgressoGeral(termo) {
  const frente = await acharFrentePorNome(termo);

  </div>`;
}

// ✅ helper: avanço realizado de uma frente numa data (por etapa)
function avancosDaFrenteNaData(frente, dataStr) {
  const itens = [];
  (frente.AvancoPorEtapa || []).forEach(et => {
    const dia = (et.Dias || []).find(d => d.Data === dataStr);
    if (dia && dia.DiarioRealizado !== null && dia.DiarioRealizado !== undefined && dia.DiarioRealizado > 0) {
      itens.push({ etapa: et.Etapa, avanco: dia.DiarioRealizado, obs: dia.Observacoes });
    }
  });
  return itens;
}

// ✅ "detonou [frente] ontem/dia X?" — responde sim/não com os detalhes;
// se não teve detonação naquela frente, mostra os fogos que tivemos
// nesse dia (em qualquer frente), como contexto
async function montarRespostaDetonouFrente(termo, periodo) {
  const frente = await acharFrentePorNome(termo);

  if (!frente) {
    return `<p style="font-size:13px; color:var(--text-soft); text-align:left; margin-top:10px;">Não identifiquei de qual frente você está falando.</p>`;
  }

  const dataStr = formatarDataCurta(periodo.data);
  const avancos = avancosDaFrenteNaData(frente, dataStr);
  const fogos = await buscarFogosNaData(dataStr);

  // ✅ além do avanço registrado, também olha se a DESCRIÇÃO do evento
  // bate com alguma variação conhecida da frente (tabela de
  // correlações) — cobre casos em que a detonação foi lançada mas o
  // avanço em metros ainda não, ou quando a descrição usa um jeito
  // diferente de se referir ao mesmo lugar
  const variantes = await buscarCorrelacoesDaFrente(frente.Nome);
  const partesNome = String(frente.Nome).split(/[-,]/).map(p => p.trim()).filter(p => p.length > 3);
  const variantesComFallback = variantes.length > 0 ? variantes : partesNome;

  const fogosDaFrentePelaDescricao = fogos.filter(f =>
    descricaoBateComVariantes(f.Descricao || '', variantesComFallback)
  );

  if (avancos.length > 0 || fogosDaFrentePelaDescricao.length > 0) {
    const fogoTxt = fogos.length > 0 ? fogos.map(f => `Fogo ${f.Evento}`).join(', ') : '';
    let html = `<div style="font-size:13px; color:var(--ink); font-weight:600; margin:10px 0 8px; text-align:left;">Sim — ${formatarTitulo(frente.Nome)} teve detonação em ${periodo.rotulo} (${dataStr}).</div>`;
    avancos.forEach(a => {
      html += `<div class="subtitulo2">${a.etapa}${fogoTxt ? ' — ' + fogoTxt : ''}: avanço <b>${a.avanco}m</b>${a.obs ? ' · ' + a.obs : ''}</div>`;
    });
    if (avancos.length === 0) {
      fogosDaFrentePelaDescricao.forEach(f => {
        html += `<div class="subtitulo2">Fogo ${f.Evento}: <span style="color:var(--ink); font-weight:400; font-family:'IBM Plex Sans',sans-serif;">${f.Descricao}</span></div>`;
      });
    }
    return html;
  }

  let html = `<div style="font-size:13px; color:var(--ink); font-weight:600; margin:10px 0 8px; text-align:left;">Não — ${formatarTitulo(frente.Nome)} não teve detonação registrada em ${periodo.rotulo} (${dataStr}).</div>`;
  if (fogos.length > 0) {
    html += `<div style="font-size:12px; color:var(--text-soft); margin:10px 0 8px;">Fogos que tivemos nesse dia (em outras frentes):</div>`;
    fogos.forEach(f => {
      html += `<div class="subtitulo2">Fogo ${f.Evento}: <span style="color:var(--ink); font-weight:400; font-family:'IBM Plex Sans',sans-serif;">${f.Descricao || '-'}</span></div>`;
    });
  }
  return html;
}

// ✅ "quando foi a última detonação de [frente]" — acha o dia mais
// recente com avanço registrado em qualquer etapa da frente
async function montarRespostaUltimaDetonacao(termo) {
  const frente = await acharFrentePorNome(termo);

  if (!frente) {
    // ✅ sem frente específica — última detonação registrada, geral
    let eventos = [];
    try {
      const doc = await db.collection('Config').doc('Detonacoes').get();
      if (doc.exists) eventos = doc.data().Eventos || [];
    } catch (e) { /* sem detonações cadastradas ainda */ }

    if (eventos.length === 0) {
      return `<p style="font-size:13px; color:var(--text-soft); text-align:left; margin-top:10px;">Não encontrei nenhuma detonação cadastrada.</p>`;
    }

    let melhorDataGeral = null;
    eventos.forEach(e => {
      const d = parseDiaMes(e.Data);
      if (d && (!melhorDataGeral || d > melhorDataGeral)) melhorDataGeral = d;
    });

    const melhorDataGeralStr = formatarDataCurta(melhorDataGeral);
    const fogosDoDiaGeral = eventos.filter(e => e.Data === melhorDataGeralStr);

    let htmlGeral = `<div style="font-size:13px; color:var(--ink); font-weight:600; margin:10px 0 8px; text-align:left;">Última detonação registrada: <b>${melhorDataGeralStr}</b></div>`;
    fogosDoDiaGeral.forEach(e => {
      htmlGeral += `<div class="subtitulo2">Fogo ${e.Evento}: <span style="color:var(--ink); font-weight:400; font-family:'IBM Plex Sans',sans-serif;">${e.Descricao || '-'}</span></div>`;
    });
    return htmlGeral;
  }

  // ✅ com frente específica: usa a SISMOGRAFIA (Config/Detonacoes) +
  // as CORRELAÇÕES de nome (que você cadastrou pra isso) como fonte de
  // verdade — não o avanço da aba de detalhe, que é só um indício
  // indireto e pode divergir da detonação de verdade
  let eventos = [];
  try {
    const doc = await db.collection('Config').doc('Detonacoes').get();
    if (doc.exists) eventos = doc.data().Eventos || [];
  } catch (e) { /* sem detonações cadastradas ainda */ }

  const variantes = await buscarCorrelacoesDaFrente(frente.Nome);

  if (variantes.length === 0) {
    return `<p style="font-size:13px; color:var(--text-soft); text-align:left; margin-top:10px;">Ainda não encontrei nenhuma correlação de nome cadastrada pra ${formatarTitulo(frente.Nome)} — sem isso não dá pra saber com segurança qual detonação da sismografia é dela. Confira a aba "Correlações - Frentes x Det." na planilha.</p>`;
  }

  // ✅ acha a data mais recente com detonação da frente...
  let melhorData = null;
  eventos.forEach(e => {
    if (descricaoBateComVariantes(e.Descricao || '', variantes)) {
      const d = parseDiaMes(e.Data);
      if (d && (!melhorData || d > melhorData)) melhorData = d;
    }
  });

  const ultimaData = ultimaDataPreenchidaDetonacoes(eventos);
  const notaData = ultimaData ? `<div style="font-size:11px; color:var(--text-soft); margin-top:8px;">(sismografia preenchida até ${ultimaData})</div>` : '';

  if (!melhorData) {
    return `<p style="font-size:13px; color:var(--text-soft); text-align:left; margin-top:10px;">Não encontrei nenhuma detonação de ${formatarTitulo(frente.Nome)} na sismografia, com as variações de nome cadastradas.</p>${notaData}`;
  }

  // ...e junta TODOS os fogos daquele dia (pode ter tido mais de um)
  const melhorDataStr = formatarDataCurta(melhorData);
  const fogosDoDia = eventos.filter(e =>
    e.Data === melhorDataStr && descricaoBateComVariantes(e.Descricao || '', variantes)
  );

  let html = `<div style="font-size:13px; color:var(--ink); font-weight:600; margin:10px 0 8px; text-align:left;">Última detonação em ${formatarTitulo(frente.Nome)}: <b>${melhorDataStr}</b></div>`;
  fogosDoDia.forEach(e => {
    html += `<div class="subtitulo2">Fogo ${e.Evento}: <span style="color:var(--ink); font-weight:400; font-family:'IBM Plex Sans',sans-serif;">${e.Descricao || '-'}</span></div>`;
  });
  html += notaData;
  return html;
}

// ✅ "qual o comprimento/total de [frente]" — usa a aba Planejamento em
// Mãos (Total por etapa)
// ✅ "qual a quantidade total de [tarefa] do [frente]" — usa o Total
// GERAL da planilha (coluna G), não a soma dos dias visíveis (que é o
// TotalPrevisto normal). Busca na coleção ProximasSemanas.
async function montarRespostaQuantidadeTotal(termo) {
  const snap = await db.collection('ProximasSemanas').get();
  let frenteEncontrada = null;

  snap.forEach(doc => {
    const f = doc.data();
    const nomeNorm = normalizarTexto(formatarTitulo(f.Nome));
    if (termo.includes(nomeNorm) || nomeNorm.includes(termo)) frenteEncontrada = f;
  });

  if (!frenteEncontrada) {
    snap.forEach(doc => {
      const f = doc.data();
      const partes = String(f.Nome).split('-').map(p => normalizarTexto(p.trim()));
      if (partes.some(p => p.length > 3 && termo.includes(p))) frenteEncontrada = f;
    });
  }

  if (!frenteEncontrada) {
    return `<p style="font-size:13px; color:var(--text-soft); text-align:left; margin-top:10px;">Não identifiquei de qual frente você está falando.</p>`;
  }

  const tarefas = frenteEncontrada.Tarefas || [];

  // ✅ tenta achar uma tarefa específica mencionada na pergunta (ex: "enfilagens")
  const tarefaEncontrada = tarefas.find(t => {
    const nomeTarefaNorm = normalizarTexto(t.Nome);
    return nomeTarefaNorm.length > 3 && termo.includes(nomeTarefaNorm);
  });

  if (tarefaEncontrada) {
    if (tarefaEncontrada.TotalGeral === null || tarefaEncontrada.TotalGeral === undefined) {
      return `<p style="font-size:13px; color:var(--text-soft); text-align:left; margin-top:10px;">Não encontrei o total geral cadastrado para "${tarefaEncontrada.Nome}".</p>`;
    }
    return `<div style="font-size:13px; color:var(--ink); text-align:left; margin-top:10px;">${formatarTitulo(frenteEncontrada.Nome)} — ${tarefaEncontrada.Nome}: <b>${tarefaEncontrada.TotalGeral}${tarefaEncontrada.Unidade}</b> (total geral previsto)</div>`;
  }

  // ✅ sem tarefa específica mencionada — lista todas as com total geral
  const comTotal = tarefas.filter(t => t.TotalGeral !== null && t.TotalGeral !== undefined);
  if (comTotal.length === 0) {
    return `<p style="font-size:13px; color:var(--text-soft); text-align:left; margin-top:10px;">Não encontrei totais gerais cadastrados em ${formatarTitulo(frenteEncontrada.Nome)}.</p>`;
  }

  let html = `<div style="font-size:12px; color:var(--text-soft); margin:10px 0 8px; text-align:left;">${formatarTitulo(frenteEncontrada.Nome)} — totais gerais:</div>`;
  comTotal.forEach(t => {
    html += `<div class="subtitulo2">${t.Nome}: <b>${t.TotalGeral}${t.Unidade}</b></div>`;
  });
  return html;
}
