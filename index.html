<!DOCTYPE html>
<html>
<head>
  <title>Planejamento em Mãos</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ FONTE -->
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

  <style>

    body {
      margin: 0;
      font-family: 'Lato', sans-serif;
      background: #f4f6f8;
      text-align: center;
    }

    /* ✅ TOPO */
    #topo {
      display: flex;
      align-items: center;
      background: white;
      padding: 10px 20px;
      border-bottom: 1px solid #ddd;
    }

    
    #topo img {
      height: 45px;
      width: auto;
      object-fit: contain;
    }


    #topo h2 {
      margin-left: 10px;
      font-size: 14px;
      font-weight: 400;
      color: #555;
    }

    /* ✅ HOME */
    #bannerHome {
      height: 240px;
      background-image: url('https://i.imgur.com/sGBGmb4.jpeg');
      background-size: cover;
      background-position: center;
    }

    .overlay {
      background: rgba(0,0,0,0.5);
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      color: white;
    }

    .tituloBanner {
      font-size: 32px;
    }

    .subtituloBanner {
      font-size: 16px;
    }

    .tituloHome {
      margin-top: 30px;
      color: #1f6e8c;
      font-size: 26px;
    }

    .btnPrimario {
      width: 300px;
      margin: 10px auto;
      padding: 12px;
      border: 1px solid #1f6e8c;
      background: white;
      color: #1f6e8c;
      border-radius: 6px;
      cursor: pointer;
      display: block;
    }

    .btnSec {
      width: 300px;
      margin: 30px auto;
      padding: 10px;
      border: 1px solid #1f6e8c;
      background: transparent;
      color: #1f6e8c;
    }

    /* ✅ DETALHE */
    #banner {
      height: 240px;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 30px;
      text-shadow: 2px 2px 6px black;
    }

    .bloco {
      margin: 15px;
      padding: 20px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .tituloBloco {
      color: #1f6e8c;
      font-weight: bold;
    }

    .situacao {
      color: #2ecc71;
      font-weight: bold;
    }

    img {
      width: 90%;
      border-radius: 10px;
      margin: 10px 0;
    }

    /* ✅ IMAGENS LADO A LADO */
    .linhaImagens {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .linhaImagens img {
      width: 45%;
    }

    @media (max-width: 768px) {

      #bannerHome { height: 160px; }
      #banner { height: 160px; font-size: 22px; }

      .btnPrimario, .btnSec { width: 90%; }

      .tituloBanner { font-size: 20px; }
      .subtituloBanner { font-size: 12px; }

      .linhaImagens img {
        width: 100%;
      }
    }

  </style>
</head>

<body>

<div id="login">
  <h2>Login</h2>
  <input id="email" type="email"><br><br>
  <input id="senha" type="password"><br><br>
  <button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none;">

  <div id="lista"></div>

  <div id="detalhe" style="display:none;">
    <div id="topo">
      <img src="https://i.imgur.com/iZ8gr1i.png">
      <h2>Planejamento em Mãos</h2>
    </div>

    <div id="banner"><span id="titulo"></span></div>
    <div id="conteudo"></div>

    <button onclick="voltar()">Voltar</button>
  </div>

  <!-- ✅ NOVA TELA -->
  <div id="semanas" style="display:none;">
    <div id="topo">
      <img src="https://i.imgur.com/iZ8gr1i.png">
      <h2>Planejamento em Mãos</h2>
    </div>

    <div id="banner">
      <h1>Próximas Semanas</h1>
    </div>

    <div id="conteudoSemanas"></div>

    <button onclick="voltarHome()">Voltar</button>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDabKVmo13MIUbtVx2O0lSJMuUT7X1DE-k",
  authDomain: "cortex-planejamento.firebaseapp.com",
  projectId: "cortex-planejamento"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();


// ✅ LOGIN
async function login() {

  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  try {
    await auth.signInWithEmailAndPassword(email, senha);

    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";

    carregar();

  } catch(e) {
    alert(e.message);
  }
}


// ✅ HOME
async function carregar() {

  const lista = document.getElementById("lista");

  lista.innerHTML = `
    <div id="topo">
      <img src="https://i.imgur.com/iZ8gr1i.png">
      <h2>Planejamento em Mãos</h2>
    </div>

    <div id="bannerHome">
      <div class="overlay">
        <h1 class="tituloBanner">Consórcio Construtor Gávea</h1>
        <p class="subtituloBanner">Planejamento em Mãos</p>
      </div>
    </div>

    <h2 class="tituloHome">Frentes de Serviço em Andamento</h2>
    <div id="botoes"></div>

    <h2 class="tituloHome">Próximas Semanas</h2>
    <button class="btnSec" onclick="abrirSemanas()">Ver Mais</button>
  `;

  const botoes = document.getElementById("botoes");

  const snap = await db.collection("Frentes").get();

  snap.forEach(doc => {
    const data = doc.data();

    const btn = document.createElement("button");
    btn.className = "btnPrimario";
    btn.innerText = data.Nome;
    btn.onclick = () => abrir(data);

    botoes.appendChild(btn);
  });
}


// ✅ BLOCO (INTACTO)
function criarBloco(s, titulo) {

  if (!s) return "";

  let html = '<div class="bloco">';
  html += '<div class="tituloBloco">' + titulo + '</div>';

  if (s["Data Prevista"]) html += '<p>' + s["Data Prevista"] + '</p>';
  if (s.Total) html += '<p><b>Total:</b> ' + s.Total + '</p>';
  if (s["Avanço"]) html += '<p><b>Avanço:</b> ' + s["Avanço"] + '</p>';

  if (s.Situacao) html += '<p class="situacao">' + s.Situacao + '</p>';

  if (s.Inicio) html += '<p>' + s.Inicio + '</p>';
  if (s.Previsto) html += '<p>' + s.Previsto + '</p>';
  if (s.Realizado) html += '<p>' + s.Realizado + '</p>';

  if (s.Grafico && s.Grafico.startsWith("http"))
    html += '<img src="' + s.Grafico + '">';

  if (s.Imagem1 && s.Imagem1.startsWith("http"))
    html += '<img src="' + s.Imagem1 + '">';

  if (s.Imagem2 && s.Imagem2.startsWith("http"))
    html += '<img src="' + s.Imagem2 + '">';

  if (s.Imagem3 && s.Imagem3.startsWith("http"))
    html += '<img src="' + s.Imagem3 + '">';

  html += '</div>';

  return html;
}


// ✅ DETALHE
function abrir(data) {

  document.getElementById("lista").style.display = "none";
  document.getElementById("detalhe").style.display = "block";

  document.getElementById("titulo").innerText = data.Nome;
  document.getElementById("banner").style.backgroundImage =
    "url('" + data.Imagem + "')";

  let html = "";

  html += criarBloco(data.LadoSul, "LADO SUL");
  html += criarBloco(data.LadoOeste, "LADO OESTE");

  if (!data.LadoSul && !data.LadoOeste) {
    html += criarBloco(data, "DADOS GERAIS");
  }

  document.getElementById("conteudo").innerHTML = html;
}


// ✅ NOVA FUNÇÃO
async function abrirSemanas() {

  document.getElementById("lista").style.display = "none";
  document.getElementById("semanas").style.display = "block";

  const container = document.getElementById("conteudoSemanas");
  container.innerHTML = "";

  const snap = await db.collection("ProximasSemanas").get();

  snap.forEach(doc => {

    const d = doc.data();

    let html = '<div class="bloco">';
    html += '<h3>' + d.Nome + '</h3>';

    if (d.Atividade) html += '<p>' + d.Atividade + '</p>';
    if (d.Inicio) html += '<p>Início: ' + d.Inicio + '</p>';
    if (d.Termino) html += '<p>Término: ' + d.Termino + '</p>';
    if (d.Tendencia) html += '<p>Tendência: ' + d.Tendencia + '</p>';
    if (d.Projeto) html += '<p>Projeto: ' + d.Projeto + '</p>'

    html += '<div class="linhaImagens">';
    if (d.Imagem1) html += '<img src="' + d.Imagem1 + '">';
    if (d.Imagem2) html += '<img src="' + d.Imagem2 + '">';
    html += '</div>';

    html += '</div>';

    container.innerHTML += html;
  });
}


// ✅ VOLTAR
function voltar() {
  document.getElementById("lista").style.display = "block";
  document.getElementById("detalhe").style.display = "none";
}

function voltarHome() {
  document.getElementById("semanas").style.display = "none";
  document.getElementById("lista").style.display = "block";
}

</script>

</body>
</html>
