    /* ✅ TOPO */
  
#topo {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: white;
  padding: 12px 15px;
  border-bottom: 1px solid #eee;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  position: sticky;
  top: 0;
  z-index: 10;

  
}
#topo img {
  height: 32px;
  width: auto;
  max-width: none; /* ⭐ ESSENCIAL */
  margin: 0;
}

#botoes {
  max-width: 700px;
  margin: 0 auto;
  padding: 0 16px; /* 👈 espaçamento lateral */
}

/* ✅ LOGO + TEXTO */
.logoArea {
  display: flex;
  align-items: center;
  gap: 8px;
}

.logoArea img {
  height: 38px;
}

.txtLogo {
  line-height: 1.1;
}

.linha1 {
  font-size: 11px;
  color: #666;
}

.linha2 {
  font-size: 16px;
  font-weight: bold;
  color: #8bc34a;
}
.painel {
  padding: 30px 20px;
  width: 100%;
  overflow: hidden;
  text-align: left;
  color: white;
  margin-bottom: 25px;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
}
.topoLista {
  max-width: 700px;              /* ✅ igual aos cards */
  width: calc(100% - 32px);      /* ✅ mesmo respiro */
  margin: 20px auto 0 auto;      /* ✅ centraliza */

  justify-content: space-between;
  align-items: center;
}

.topoLista h3 {
  font-size: 16px;
  color: #1f2d3d;
  margin: 0; /* ✅ garante alinhamento perfeito */
}

.verMais {
  font-size: 12px;
  color: #7cb342;
}
.label {
  font-size: 12px;
  color: #8bc34a;
  letter-spacing: 1px;
}

.painel h1 {
  margin: 10px 0 20px;
  font-size: 24px;
}

.metricas div {
  text-align: left;
}

.metricas h2 {
  margin: 0;
  color: #8bc34a;
  font-size: 28px;
  font-weight: bold;
}

.metricas p {
  margin-top: 5px;
  font-size: 12px;
  color: rgba(255,255,255,0.7);
}
   .metricas {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

.statusBadge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 500;
}

/* ✅ NO PRAZO */
.status-ok {
  background: #f1f8e9;
  color: #7cb342;
}

/* ✅ ATRASADA */
.status-atrasada {
  background: #fdecea;
  color: #c62828;
}

/* ✅ BOLINHA */
.statusDot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.status-ok .statusDot {
  background: #7cb342;
}

.status-atrasada .statusDot {
  background: #e53935;
}

.itemPainel {
  display: flex;
  align-items: center;
  padding-right: 15px;
  gap: 12px;
  flex: 1;
}

/* ícone com fundo suave */
.itemPainel img {
  width: 28px;
  height: 28px;
  padding: 10px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
}

/* número */
.itemPainel h2 {
  margin: 0;
  font-size: 20px;
  color: #8bc34a;
}

/* texto */

  margin: 0;
  font-size: 12px;
  color: rgba(255,255,255,0.7);
}

/* DIVISOR */
.itemPainel:not(:last-child) {
  border-right: none;
  margin-right: 0;
  padding-right: 0;
}
/* ✅ DIVISOR */
.divisor {
  width: 1px;
  height: 30px;
  background: #ddd;
  margin: 0 10px;
}

/* ✅ NOME DO APP */
.nomeApp {
  font-size: 13px;
  color: #555;
  flex: 1;
}

/* ✅ SININHO */

.notif {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  position: relative;
}

.notif img {
  width: 14px;
  height: 14px;
}

#topo .notif img {
  width: 14px;
  height: 14px;
}

#contadorNotif {
  position: absolute;
  top: -5px;
  right: -8px;
  background: #8bc34a;
  color: white;
  font-size: 10px;
  padding: 3px 6px;
  border-radius: 50%;
}


    /* ✅ HOME */
   
    .tituloBanner {
      font-size: 32px;
    }

    .subtituloBanner {
      font-size: 16px;
    }

    .tituloHome {

    }

    .btnPrimario {

    /* ✅ DETALHE */
    #banner {

.bloco {

      color: var(--accent);

    }

    .bloco img {

    .linhaImagens {

    }

    overflow-x: hidden;
    max-width: 100%;

.conteudo-header {

.fundoLogin {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;

}

  background: white;

/* ===========================================================
   ✅ REDESIGN DA TELA INICIAL (hero, régua de progresso, agenda, gantt)
   =========================================================== */
:root{
  --ink:#131F1D;
  --ink-2:#1C2B28;
  --paper:#FFFFFF;
  --paper-2:#F2F2F0;
  --line:#D8D7CD;
  --line-dark:#2E3E3A;
  --accent:#6F8F3F;
  --accent-bright:#8FB84B;
  --text-soft:#6B7570;
  --text-soft-dark:#8FA098;
  /* ✅ painel/hero — sempre escuro, não inverte com o tema */
  --painel-1:#131F1D;
  --painel-2:#1C2B28;
  --painel-texto:#F2F1EA;
  --card-fundo:#FFFFFF;
  --icone-cor:#131F1D;
}

/* ✅ TEMA ESCURO — inverte as variáveis; tudo que usa var(--...) responde
   automaticamente. Vale pra tela inicial e pro gráfico de Gantt. */
body.tema-escuro{
  --ink:#F2F1EA;
  --ink-2:#EDECE5;
  --paper:#12201C;
  --paper-2:#1C2B28;
  --line:#33443F;
  --line-dark:#465852;
  --accent:#8FB84B;
  --accent-bright:#A8D666;
  --text-soft:#93A49C;
  --text-soft-dark:#6B7570;
  --painel-1:#0B120F;
  --painel-2:#12201C;
  --painel-texto:#F2F1EA;
  --card-fundo:#1C2B28;
  --icone-cor:#F2F1EA;
  background:var(--paper);
}

.toggleTema{
  width:20px; height:20px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
  font-size:15px;
  margin-right:14px;
  color:var(--ink);
}

#lista{ background:var(--paper); padding-bottom:70px; }
#telaProximasSemanas{ background:var(--paper); padding-bottom:70px; min-height:100vh; }
#telaCronograma{ background:var(--paper); padding-bottom:70px; min-height:100vh; }

#navInferior{
  position:fixed;
  bottom:0; left:0; right:0;
  display:flex;
  justify-content:space-around;
  background:var(--card-fundo);
  border-top:1px solid var(--line);
  padding:8px 0 10px;
  z-index:20;
}
.navItem{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:2px;
  font-family:'IBM Plex Sans', sans-serif;
  font-size:10.5px;
  color:var(--text-soft);
  cursor:pointer;
  flex:1;
}
.navItem.ativo{ color:var(--accent); font-weight:600; }
.navIcone{ width:20px; height:20px; }


/* -------- topo -------- */
#lista #topo{
  background:var(--paper);
  border-bottom:1px solid var(--line);
}
#lista #topo img[src*="iZ8gr1i"],
#detalhe #topo img[src*="iZ8gr1i"],
#semanas #topo img[src*="iZ8gr1i"],
#telaGantt #topo img[src*="iZ8gr1i"],
#notificacoes #topo img[src*="iZ8gr1i"]{
  background:#FFFFFF;
  border-radius:8px;
  padding:4px 8px;
}
body.tema-escuro .iconeIndicador{
  filter: brightness(0) invert(1);
  opacity: 0.55;
}

/* -------- hero -------- */
.heroNovo{
  background:linear-gradient(160deg, var(--painel-1) 0%, var(--painel-2) 100%);
  padding:28px 20px 26px;
  color:var(--painel-texto);
  text-align:left;
}
.heroNovo .eyebrow{
  font-family:'IBM Plex Mono', monospace;
  font-size:10px;
  letter-spacing:0.16em;
  color:var(--accent-bright);
  text-transform:uppercase;
  margin-bottom:10px;
}
.heroNovo h1{
  font-family:'Archivo', sans-serif;
  font-weight:800;
  font-size:30px;
  letter-spacing:-0.02em;
  line-height:1.05;
  margin-bottom:22px;
  color:var(--painel-texto);
}
.kpiGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1px;
  background:var(--line-dark);
  border:1px solid var(--line-dark);
  max-width:700px;
  margin:0 auto;
}
.kpiCard{
  position:relative;
  background:var(--painel-1);
  padding:16px 14px 14px;
  text-align:left;
}
.kpiCard::before, .kpiCard::after{
  content:''; position:absolute; width:9px; height:9px;
}
.kpiCard::before{ top:6px; left:6px; border-top:1.5px solid var(--accent); border-left:1.5px solid var(--accent); }
.kpiCard::after{ bottom:6px; right:6px; border-bottom:1.5px solid var(--accent); border-right:1.5px solid var(--accent); }
.kpiCard .val{
  font-family:'IBM Plex Mono', monospace;
  font-weight:600;
  font-size:24px;
  color:#F2F1EA;
  line-height:1;
  margin-bottom:8px;
}
.kpiCard .val.pos{ color:var(--accent-bright); }
.kpiCard .lbl{
  font-family:'IBM Plex Sans', sans-serif;
  font-size:10.5px;
  letter-spacing:0.04em;
  color:var(--text-soft-dark);
  text-transform:uppercase;
}

/* -------- seções -------- */
.secaoNova{ padding:26px 20px 6px; max-width:700px; margin:0 auto; text-align:left; }
.secaoNova .cabecalho{
  display:flex; align-items:baseline; justify-content:space-between;
  margin-bottom:14px; flex-wrap:wrap; gap:8px;
}
.secaoNova .tituloSecao{
  font-family:'IBM Plex Mono', monospace;
  font-size:10.5px;
  letter-spacing:0.14em;
  text-transform:uppercase;
  color:var(--text-soft);
}
.secaoNova .contagemSecao{
  font-family:'IBM Plex Mono', monospace;
  font-size:10.5px;
  color:var(--text-soft);
}
.secaoNova hr.regra{ border:none; border-top:1px solid var(--line); margin-bottom:18px; }

.btnGantt{
  font-family:'IBM Plex Mono', monospace;
  font-size:10px;
  letter-spacing:0.06em;
  text-transform:uppercase;
  color:var(--ink);
  background:var(--paper-2);
  border:1px solid var(--line);
  padding:6px 10px;
  cursor:pointer;
  border-radius:2px;
}
.btnGantt:hover{ background:var(--line); }

.caixaBusca{
  display:flex;
  gap:8px;
  margin:14px 0 4px;
}
.caixaBusca input{
  flex:1;
  font-family:'IBM Plex Sans', sans-serif;
  font-size:13px;
  color:var(--ink);
  background:var(--card-fundo);
  border:1px solid var(--line);
  border-radius:4px;
  padding:9px 12px;
  min-width:0;
}
.caixaBusca input::placeholder{ color:var(--text-soft); }
.caixaBusca input:focus{ outline:none; border-color:var(--accent); }
.btnBusca{
  font-family:'IBM Plex Mono', monospace;
  font-size:11px;
  letter-spacing:0.06em;
  text-transform:uppercase;
  color:#fff;
  background:var(--accent);
  border:none;
  padding:0 16px;
  border-radius:4px;
  cursor:pointer;
  flex-shrink:0;
}
.btnBusca:hover{ background:var(--accent-bright); }

.btnVoltar{
  display:block;
  margin:20px auto 30px;
  font-family:'IBM Plex Mono', monospace;
  font-size:11px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:var(--ink);
  background:var(--card-fundo);
  border:1px solid var(--line);
  padding:10px 22px;
  border-radius:4px;
  cursor:pointer;
}
.btnVoltar:hover{ background:var(--paper-2); }

/* -------- régua de progresso (frentes) -------- */
.frenteNova{
  padding:16px 0;
  border-bottom:1px solid var(--line);
  cursor:pointer;
}
.frenteNova:last-child{ border-bottom:none; }
.frenteNova .topo2{
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:10px;
}
.frenteNova .nome2{
  font-family:'Archivo', sans-serif;
  font-weight:700;
  font-size:16.5px;
  color:var(--ink);
  letter-spacing:-0.01em;
}
.tagStatus{
  display:inline-flex; align-items:center; gap:5px;
  font-family:'IBM Plex Mono', monospace;
  font-size:9.5px;
  letter-spacing:0.06em;
  text-transform:uppercase;
  padding:3px 7px;
  border:1px solid var(--accent);
  color:var(--accent);
}
.tagStatus.atrasada{ border-color:#c0392b; color:#c0392b; }
.tagStatus .ponto{ width:5px; height:5px; border-radius:50%; background:currentColor; }

.regua{ position:relative; height:16px; margin-bottom:8px; }
.regua-trilho{
  position:absolute; top:6px; left:0; right:0; height:3px;
  background:var(--paper-2); border:1px solid var(--line);
}
.regua-preenchida{
  position:absolute; top:6px; left:0; height:3px; background:var(--accent);
}
.regua-marcas{
  position:absolute; top:0; left:0; right:0; height:16px;
  display:flex; justify-content:space-between;
}
.regua-marcas span{ width:1px; height:6px; background:var(--line); }
.regua-marcas span:nth-child(5n+1){ height:9px; background:#B9B8AC; }

.frenteNova .baixo2{ display:flex; align-items:center; justify-content:space-between; }
.frenteNova .pct2{
  font-family:'IBM Plex Mono', monospace;
  font-weight:600; font-size:14px; color:var(--ink);
}
.frenteNova .meta2{
  font-family:'IBM Plex Mono', monospace;
  font-size:10.5px; color:var(--text-soft);
}

/* -------- agenda (próximas semanas) -------- */
.agendaItem{
  display:flex; gap:16px;
  padding:16px 0 22px;
  border-bottom:1px solid var(--line);
  cursor:pointer;
}
.agendaItem:last-child{ border-bottom:none; }
.agendaData{
  font-family:'IBM Plex Mono', monospace;
  text-align:center;
  padding-right:16px;
  border-right:1px solid var(--line);
  min-width:44px;
  flex-shrink:0;
}
.agendaData .dia2{ font-size:22px; font-weight:600; color:var(--ink); line-height:1; }
.agendaData .mes2{ font-size:9.5px; letter-spacing:0.1em; color:var(--text-soft); margin-top:4px; }

.agendaBody .titulo2{
  font-family:'Archivo', sans-serif;
  font-weight:700; font-size:15.5px; color:var(--ink); margin-bottom:2px;
}
.subtitulo2{
  font-family:'IBM Plex Mono', monospace;
  font-size:11px; color:var(--accent); margin-bottom:10px;
  text-align:left;
}
.agendaRow{
  font-family:'IBM Plex Sans', sans-serif;
  font-size:12px; color:var(--text-soft); margin-bottom:6px;
}
.agendaRow b{ color:var(--ink); }
.agendaVerMais{
  font-family:'IBM Plex Mono', monospace;
  font-size:10.5px; letter-spacing:0.04em; color:var(--accent);
  margin-top:4px; display:inline-block;
}

/* -------- gráfico de gantt -------- */
#telaGantt{ background:var(--paper); }
#telaGantt #topo, #semanas #topo, #detalhe #topo{
  background:var(--paper);
  border-bottom:1px solid var(--line);
  color:var(--ink);
}
#semanas{ background:var(--paper); }
#detalhe{ background:var(--paper); }
#bannerSemanas h1{ color:#F2F1EA; }
.ganttWrap{
  padding:16px 16px 40px;
  max-width:900px;
  margin:0 auto;
}

.ganttNovo{
  font-family:'IBM Plex Sans', sans-serif;
}

.ganttLinhaEixo, .ganttLinhaH{
  display:flex;
  align-items:center;
  gap:8px;
  min-height:30px;
  border-bottom:1px solid var(--line);
}

.ganttLinhaEixo{
  position:relative;
  min-height:22px;
  border-bottom:1px solid var(--line-dark);
  margin-bottom:6px;
}

.ganttLabelH{
  width:118px; flex-shrink:0;
  font-size:11px;
  color:var(--ink);
  line-height:1.3;
  word-break:break-word;
}
.ganttTopico{
  display:block;
  font-family:'IBM Plex Mono', monospace;
  font-size:9px;
  color:var(--text-soft);
  margin-bottom:1px;
}

.ganttTrilhaH{
  position:relative;
  flex:1;
  height:26px;
}

.ganttMarcaMes{
  position:absolute;
  top:0;
  transform:translateX(-2px);
  font-family:'IBM Plex Mono', monospace;
  font-size:9.5px; font-weight:600;
  color:var(--ink);
  white-space:nowrap;
}

.ganttBarraH{

.ganttGrupoH{

  border-top:1px solid var(--line-dark);
}
.ganttGrupoH:first-of-type{ border-top:none; padding-top:0; margin-top:8px; }

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDabKVmo13MIUbtVx2O0lSJMuUT7X1DE-k",
  authDomain: "cortex-planejamento.firebaseapp.com",
  projectId: "cortex-planejamento"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ✅ LOGIN
async function login() {

  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const dispositivoAtual = navigator.userAgent;

  const ref = db.collection("Sessoes").doc(email);
  const doc = await ref.get();

  // ✅ verifica se já existe sessão
  if (doc.exists) {
    const dados = doc.data();

    if (dados.dispositivo !== dispositivoAtual) {
      alert("Este usuário já está logado em outro dispositivo.");
      return;
    }
  }

  try {
    await auth.signInWithEmailAndPassword(email, senha);

    // ✅ salva sessão
    await db.collection("Sessoes").doc(email).set({
      dispositivo: dispositivoAtual,
      data: new Date()
    });

    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";

    mostrarTelaFrentes();

  } catch(e) {
    alert(e.message);
  }
}
async function logout() {

  const email = auth.currentUser.email;

  await db.collection("Sessoes").doc(email).delete();
  await auth.signOut();

  location.reload();
}

// ✅ HOME
let telaAtual = 'frentes'; // ✅ controla qual das 3 telas principais está ativa

function ativarNavItem(id) {
  document.querySelectorAll(".navItem").forEach(el => el.classList.remove("ativo"));
  const el = document.getElementById(id);
  if (el) el.classList.add("ativo");
}

async function mostrarTelaFrentes() {
  document.getElementById("lista").style.display = "block";
  document.getElementById("telaProximasSemanas").style.display = "none";
  document.getElementById("telaCronograma").style.display = "none";
  ativarNavItem("navItemFrentes");
  telaAtual = 'frentes';

  if (!window.frentesCarregadas) {
    window.frentesCarregadas = true;
    await carregarFrentes();
  }
}

async function mostrarTelaProximasSemanas() {
  document.getElementById("lista").style.display = "none";
  document.getElementById("telaProximasSemanas").style.display = "block";
  document.getElementById("telaCronograma").style.display = "none";
  ativarNavItem("navItemSemanas");
  telaAtual = 'semanas';

  if (!window.semanasCarregadas) {
    window.semanasCarregadas = true;
    await carregarProximasSemanas();
  }
}

function mostrarTelaCronograma() {
  document.getElementById("lista").style.display = "none";
  document.getElementById("telaProximasSemanas").style.display = "none";
  document.getElementById("telaCronograma").style.display = "block";
  ativarNavItem("navItemCronograma");
  telaAtual = 'cronograma';

  const container = document.getElementById("telaCronograma");
  if (!container.innerHTML) {
    container.innerHTML = `
      <div id="topo">
        <img src="https://i.imgur.com/iZ8gr1i.png" style="height:38px;">
        <div style="display:flex; align-items:center;">
          <span class="toggleTema iconeTema" onclick="alternarTema()">🌙</span>
        </div>
      </div>
      <div class="heroNovo">
        <div class="eyebrow">Planejamento em mãos</div>
        <h1 style="font-size:26px;">Cronograma Geral</h1>
      </div>
      <section class="secaoNova">
        <p style="color:var(--text-soft); font-size:13px; text-align:left;">
          Essa tela ainda está em construção — em breve.
        </p>
      </section>
    `;
    atualizarIconeTema();
  }
}

async function carregarFrentes() {

  const lista = document.getElementById("lista");

  lista.innerHTML = `
    <div id="topo">

      <img src="https://i.imgur.com/iZ8gr1i.png" style="height:38px;">

      <div style="display:flex; align-items:center;">

  container.innerHTML = `

    </section>
  `;

  atualizarIconeTema();

  const listaContainer = document.getElementById("listaProximasSemanas");

  const snapSemanas = await db.collection("ProximasSemanas").get();

  const frentesSemanas = [];

  snapSemanas.forEach(doc => {
    const d = doc.data();
    const tarefas = d.Tarefas || [];
    if (tarefas.length === 0) return;

    // ✅ data de início/término agregada: a mais cedo e a mais tarde
    // entre TODAS as tarefas da frente (não só uma)
    let menorInicio = null, maiorTermino = null;

    tarefas.forEach(t => {
      const dataInicio = parseDiaMes(t.InicioPrevisto);
      const dataTermino = parseDiaMes(t.TerminoPrevisto) || dataInicio;

      if (dataInicio && (!menorInicio || dataInicio < menorInicio)) menorInicio = dataInicio;
      if (dataTermino && (!maiorTermino || dataTermino > maiorTermino)) maiorTermino = dataTermino;
    });

    frentesSemanas.push({ dados: d, tarefas, menorInicio, maiorTermino });
  });

  // ✅ ordem cronológica pura: quem começa primeiro aparece primeiro
  frentesSemanas.sort((a, b) => {
    if (!a.menorInicio) return 1;
    if (!b.menorInicio) return -1;
    return a.menorInicio - b.menorInicio;
  });

  // ✅ guarda pra reaproveitar no gráfico de Gantt sem precisar buscar de novo
  window.todasFrentesSemanas = frentesSemanas.map(item => item.dados);

  const MESES_ABREV = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];

  frentesSemanas.forEach(item => {
    const d = item.dados;

    const dia2 = item.menorInicio ? String(item.menorInicio.getDate()).padStart(2, '0') : '-';
    const mes2 = item.menorInicio ? MESES_ABREV[item.menorInicio.getMonth()] : '';

    const linhasTarefas = item.tarefas.map(t => `
      <div class="subtitulo2">${t.Nome}${t.Subgrupo ? ' <span style="color:var(--text-soft); font-weight:400;">(' + t.Subgrupo + ')</span>' : ''}
        <span style="color:var(--text-soft); font-family:'IBM Plex Sans',sans-serif; font-weight:400;">
          — previsto ${t.TotalPrevisto}${t.Unidade}
        </span>
      </div>
    `).join('');

    const card = document.createElement("div");
    card.className = "agendaItem";

    card.innerHTML = `
      <div class="agendaData">
        <div class="dia2">${dia2}</div>
        <div class="mes2">${mes2}</div>
      </div>
      <div class="agendaBody">
        <div class="titulo2">${formatarTitulo(d.Nome)}</div>
        <div class="agendaRow" style="margin-bottom:8px;">
          Início ${item.menorInicio ? formatarDataCurta(item.menorInicio) : "-"} ·
          Término ${item.maiorTermino ? formatarDataCurta(item.maiorTermino) : "-"}
        </div>
        ${linhasTarefas}

function criarBloco(s, titulo) {

  let html = '<div class="bloco">';

  if (s["Data Prevista"]) html += '<p>' + s["Data Prevista"] + '</p>';

  if (s["Avanço"]) html += '<p><b>Avanço:</b> ' + s["Avanço"] + '</p>';

  if (s.Situacao) html += '<p class="situacao">' + s.Situacao + '</p>';

  if (s.Inicio) html += '<p>' + s.Inicio + '</p>';
  if (s.Previsto) html += '<p>' + s.Previsto + '</p>';

function formatarTitulo(texto) {
  if (!texto) return texto;
  const preposicoes = ['de', 'da', 'do', 'das', 'dos', 'e'];
  return texto.trim().toLowerCase().split(' ').map((palavra, i) => {
    if (/\d/.test(palavra)) return palavra.toUpperCase();
    if (palavra.length <= 3 && !/[aeiouáéíóúãõâêôàü]/.test(palavra)) return palavra.toUpperCase();
    if (i > 0 && preposicoes.includes(palavra)) return palavra;
    return palavra.charAt(0).toUpperCase() + palavra.slice(1);
  }).join(' ');
}

// ✅ converte "dd/MM" (formato salvo pelo script) em Date, usando o ano atual
function parseDiaMes(str) {
  if (!str) return null;
  const partes = str.split('/');
  if (partes.length !== 2) return null;
  const dia = parseInt(partes[0]);
  const mes = parseInt(partes[1]) - 1;
  if (isNaN(dia) || isNaN(mes)) return null;
  return new Date(new Date().getFullYear(), mes, dia);
}

function formatarData(dataStr) {

  if (!dataStr) return { dia: "-", mes: "-", diaSemana: "-" };

  // ✅ quebra DD-MM-YYYY
  const partes = dataStr.split("-");

  const dia = parseInt(partes[0]);
  const mesIndex = parseInt(partes[1]) - 1;
  const ano = parseInt(partes[2]);

  const data = new Date(ano, mesIndex, dia);

  const meses = ["JAN","FEV","MAR","ABR","MAI","JUN",
                 "JUL","AGO","SET","OUT","NOV","DEZ"];

  const dias = ["DOM","SEG","TER","QUA","QUI","SEX","SAB"];

  return {
    dia: dia,
    mes: meses[mesIndex],
    diaSemana: dias[data.getDay()]
  };
}

// ✅ mesma paleta usada no Apps Script pra gerar os gráficos — precisa
// ficar igual, na mesma ordem, pra legenda em HTML bater com as cores
// das linhas do gráfico
const PALETA_ETAPAS_JS = ['#7CB342', '#4A90D9', '#E67E22', '#9B59B6', '#16A085', '#C0392B'];

function statusRealizado(etapa) {
  if (!etapa.InicioRealizado) return 'ainda não iniciado';

  const periodo = `${etapa.InicioRealizado} até ${etapa.TerminoRealizado || '-'}`;

  const totalPrevisto = etapa.TotalPrevisto || 0;
  const totalRealizado = etapa.TotalRealizado || 0;

  // ✅ considera concluído quando o realizado alcança (ou passa) o
  // total previsto — com uma margem pequena pra arredondamento
  if (totalPrevisto > 0 && totalRealizado >= totalPrevisto - 0.05) {
    return `${periodo} — concluído`;
  }

  return `${periodo} — em andamento`;
}

// ✅ GRÁFICO DE GANTT — todas as frentes, todas as tarefas com data prevista
function abrirGantt() {

  esconderTelasPrincipais();
  document.getElementById("telaGantt").style.display = "block";

  const container = document.getElementById("conteudoGantt");
  const frentes = window.todasFrentesSemanas || [];

  // ✅ achata todas as tarefas de todas as frentes numa lista só
  const tarefas = [];
  frentes.forEach(frente => {
    (frente.Tarefas || []).forEach(t => {
      const inicio = parseDiaMes(t.InicioPrevisto);
      if (!inicio) return;
      let termino = parseDiaMes(t.TerminoPrevisto) || inicio;
      if (termino < inicio) termino = inicio;
      tarefas.push({
        frente: formatarTitulo(frente.Nome),
        topico: t.Topico || '',
        nome: t.Nome,
        inicio, termino,
      });
    });
  });

  if (tarefas.length === 0) {
    container.innerHTML = '<p style="font-family:\'IBM Plex Sans\',sans-serif; font-size:13px; color:var(--text-soft); padding:20px;">Nenhuma tarefa com data prevista encontrada.</p>';
    return;
  }

  const minDate = new Date(Math.min(...tarefas.map(t => t.inicio)));
  const maxDate = new Date(Math.max(...tarefas.map(t => t.termino)));
  const totalDias = Math.max(1, Math.round((maxDate - minDate) / 86400000) + 1);

  // ✅ agrupa por frente, mantendo a ordem em que apareceram
  const porFrente = {};
  tarefas.forEach(t => {
    if (!porFrente[t.frente]) porFrente[t.frente] = [];
    porFrente[t.frente].push(t);
  });

  const pctPorDia = dia => (dia / totalDias) * 100;

  const MESES_EIXO = ['jan','fev','mar','abr','mai','jun',
    'jul','ago','set','out','nov','dez'];

  // ✅ eixo: só marca o INÍCIO DE CADA MÊS (bem mais espaçado que
  // marcar cada semana — evita as datas ficarem grudadas)
  const marcasMes = [];
  let cursorMes = new Date(minDate.getFullYear(), minDate.getMonth(), 1);
  if (cursorMes < minDate) cursorMes.setMonth(cursorMes.getMonth() + 1);
  while (cursorMes <= maxDate) {
    marcasMes.push(new Date(cursorMes));
    cursorMes.setMonth(cursorMes.getMonth() + 1);
  }
  // garante que o próprio início do período também apareça marcado
  if (marcasMes.length === 0 || marcasMes[0].getTime() !== minDate.getTime()) {
    marcasMes.unshift(new Date(minDate));
  }

  let eixoHtml = '';
  marcasMes.forEach(dt => {
    const offsetDias = Math.round((dt - minDate) / 86400000);
    const left = pctPorDia(offsetDias);
    eixoHtml += `
      <div class="ganttMarcaMes" style="left:${left}%;">${dt.getDate()} ${MESES_EIXO[dt.getMonth()]}</div>
    `;
  });

  let linhasHtml = `
    <div class="ganttLinhaEixo">
      <div class="ganttLabelH"></div>
      <div class="ganttTrilhaH">${eixoHtml}</div>
    </div>
  `;

  Object.keys(porFrente).forEach(nomeFrente => {
    linhasHtml += `<div class="ganttGrupoH">${nomeFrente}</div>`;

    porFrente[nomeFrente].forEach(t => {
      const offsetDias = Math.round((t.inicio - minDate) / 86400000);
      const duracaoDias = Math.round((t.termino - t.inicio) / 86400000) + 1;
      const left = pctPorDia(offsetDias);
      const width = Math.max(1.2, pctPorDia(duracaoDias));

      linhasHtml += `
        <div class="ganttLinhaH">
          <div class="ganttLabelH">
            ${t.topico ? `<span class="ganttTopico">${t.topico}</span>` : ''}
            ${t.nome}
          </div>
          <div class="ganttTrilhaH">
            <div class="ganttBarraH" style="left:${left}%; width:${width}%;"
                 title="${t.nome}: ${formatarDataCurta(t.inicio)} a ${formatarDataCurta(t.termino)}"></div>
          </div>
        </div>
      `;
    });
  });

  container.innerHTML = `<div class="ganttNovo">${linhasHtml}</div>`;
}

function formatarDataCurta(data) {
  return String(data.getDate()).padStart(2, '0') + '/' + String(data.getMonth() + 1).padStart(2, '0');
}

// ✅ BUSCA INTELIGENTE — reconhece perguntas específicas sobre a planilha
// de Próximas Semanas (sem usar nenhuma IA, é tudo filtro direto)
function normalizarTexto(t) {
  return String(t || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

async function buscarInteligente(sufixo) {
  const input = document.getElementById('inputBusca' + sufixo).value.trim();
  const resultado = document.getElementById('resultadoBusca' + sufixo);

  if (!input) { resultado.innerHTML = ''; return; }

  resultado.innerHTML = '<p style="font-size:12px; color:var(--text-soft); text-align:left; margin-top:10px;">Buscando...</p>';

  const termo = normalizarTexto(input);
  const hoje = new Date();

  // ✅ extrai um período mencionado na pergunta: um dia específico
  // ("ontem", "hoje", "amanhã", dd/mm) ou um intervalo ("semana passada")
  function extrairPeriodo() {
    if (termo.includes('semana passada') || termo.includes('ultima semana') || termo.includes('última semana')) {
      const fim = new Date(hoje);
      fim.setDate(fim.getDate() - 1);
      const inicio = new Date(hoje);
      inicio.setDate(inicio.getDate() - 7);
      return { tipo: 'intervalo', inicio, fim, rotulo: 'semana passada' };
    }
    if (termo.includes('ontem')) {
      const ontem = new Date(hoje);
      ontem.setDate(ontem.getDate() - 1);
      return { tipo: 'dia', data: ontem, rotulo: 'ontem' };
    }
    if (termo.includes('amanha')) {
      const amanha = new Date(hoje);
      amanha.setDate(amanha.getDate() + 1);
      return { tipo: 'dia', data: amanha, rotulo: 'amanhã' };
    }
    const m = termo.match(/(\d{1,2})[\/\-](\d{1,2})/);
    if (m) {
      const dia = parseInt(m[1]);
      const mes = parseInt(m[2]);
      const d = new Date(hoje.getFullYear(), mes - 1, dia);
      return { tipo: 'dia', data: d, rotulo: `o dia ${String(dia).padStart(2,'0')}/${String(mes).padStart(2,'0')}` };
    }
    if (termo.includes('hoje')) {
      return { tipo: 'dia', data: hoje, rotulo: 'hoje' };
    }
    return null;
  }

  let html = '';

  const perguntaDetonacao = termo.includes('detonac');
  const perguntaTermino = termo.includes('termina') || termo.includes('terminar') || termo.includes('conclu');
  const perguntaAvancoData = termo.includes('avanco') && extrairPeriodo();
  const perguntaNaoPrevisto = termo.includes('nao previsto') || termo.includes('sem previsto') ||
    termo.includes('fora do planejado') || termo.includes('nao estava previsto') ||
    termo.includes('nao planejado') || (termo.includes('nao') && termo.includes('previa'));
  const matchData = termo.match(/(\d{1,2})[\/\-](\d{1,2})/);

  if (perguntaDetonacao) {
    const periodo = extrairPeriodo();
    const infoData = (periodo && periodo.tipo === 'dia') ? periodo : { data: hoje, rotulo: 'hoje' };
    html = await montarRespostaDetonacoes(infoData.data, infoData.rotulo);

  } else if (perguntaTermino) {
    html = await montarRespostaTermino(termo);

  } else if (perguntaAvancoData) {
    html = await montarRespostaAvancoData(termo, perguntaAvancoData);

  } else if (perguntaNaoPrevisto) {
    const snap = await db.collection('ProximasSemanas').get();
    const frentes = [];
    snap.forEach(doc => frentes.push(doc.data()));
    html = montarRespostaNaoPrevisto(frentes);

  } else if (termo.includes('hoje')) {
    const snap = await db.collection('ProximasSemanas').get();
    const frentes = [];
    snap.forEach(doc => frentes.push(doc.data()));
    html = montarRespostaPorData(frentes, formatarDataCurta(hoje), 'hoje');

  } else if (termo.includes('amanha')) {
    const snap = await db.collection('ProximasSemanas').get();
    const frentes = [];
    snap.forEach(doc => frentes.push(doc.data()));
    const amanha = new Date(hoje);
    amanha.setDate(amanha.getDate() + 1);
    html = montarRespostaPorData(frentes, formatarDataCurta(amanha), 'amanhã');

  } else if (matchData) {
    const snap = await db.collection('ProximasSemanas').get();
    const frentes = [];
    snap.forEach(doc => frentes.push(doc.data()));
    const dia = matchData[1].padStart(2, '0');
    const mes = matchData[2].padStart(2, '0');
    html = montarRespostaPorData(frentes, `${dia}/${mes}`, `o dia ${dia}/${mes}`);

  } else if (termo.includes('semana')) {
    const snap = await db.collection('ProximasSemanas').get();
    const frentes = [];
    snap.forEach(doc => frentes.push(doc.data()));
    html = montarRespostaSemana(frentes, hoje);

  } else {
    const snap = await db.collection('ProximasSemanas').get();
    const frentes = [];
    snap.forEach(doc => frentes.push(doc.data()));

    const encontrada = frentes.find(f => {
      const nomeNormalizado = normalizarTexto(formatarTitulo(f.Nome));
      return nomeNormalizado.includes(termo) || termo.includes(nomeNormalizado);
    });

    if (encontrada) {
      html = montarRespostaFrente(encontrada);
    } else {
      html = `<p style="font-size:13px; color:var(--text-soft); text-align:left; margin-top:10px; line-height:1.6;">
        Não entendi essa pergunta. Tente algo como:<br>
        · "quais detonações tivemos ontem"<br>
        · "o que está previsto para hoje"<br>
        · "quando termina o Apêndice"<br>
        · "qual avanço tivemos na SSR 04 ontem"<br>
        · "o que vem essa semana"<br>
        · "tem algo fora do planejado"<br>
        · ou o nome de uma frente, tipo "Estação Sul"
      </p>`;
    }
  }

  resultado.innerHTML = html;
}

// ✅ "quais detonações tivemos [ontem/hoje/em dd/mm]" — cruza a aba de
// sismografia (evento + descrição) com o avanço diário de cada frente
// (pra saber qual frente/etapa teve avanço naquele dia, com PK e observação)
async function montarRespostaDetonacoes(data, rotulo) {
  const dataStr = formatarDataCurta(data);

  let detonacoesDoDia = [];
  try {
    const doc = await db.collection('Config').doc('Detonacoes').get();
    if (doc.exists) {
      const eventos = doc.data().Eventos || [];
      detonacoesDoDia = eventos.filter(e => e.Data === dataStr);
    }
  } catch (e) { /* sem detonações cadastradas ainda */ }

  const snapFrentes = await db.collection('Frentes').get();
  const avancosDoDia = [];
  snapFrentes.forEach(doc => {
    const f = doc.data();
    (f.AvancoPorEtapa || []).forEach(et => {
      (et.Dias || []).forEach(dia => {
        if (dia.Data === dataStr && dia.DiarioRealizado !== null && dia.DiarioRealizado !== undefined && dia.DiarioRealizado > 0) {
          avancosDoDia.push({
            frente: formatarTitulo(f.Nome), etapa: et.Etapa,
            pkInicial: dia.PkInicial, pkFinal: dia.PkFinal,
            avanco: dia.DiarioRealizado, observacao: dia.Observacoes,
          });
        }
      });
    });
  });

  if (detonacoesDoDia.length === 0 && avancosDoDia.length === 0) {
    return `<p style="font-size:13px; color:var(--text-soft); text-align:left; margin-top:10px;">Não encontrei detonações nem avanço registrado para ${rotulo} (${dataStr}).</p>`;
  }

  let html = `<div style="font-size:12px; color:var(--text-soft); margin:10px 0 8px; text-align:left;">Detonações em ${rotulo} (${dataStr}):</div>`;

  if (detonacoesDoDia.length > 0) {
    detonacoesDoDia.forEach(e => {
      html += `<div class="subtitulo2">Evento ${e.Evento}: <span style="color:var(--ink); font-weight:400; font-family:'IBM Plex Sans',sans-serif;">${e.Descricao || '-'}</span></div>`;
    });
  } else {
    html += `<div style="font-size:12px; color:var(--text-soft); margin-bottom:8px;">Nenhum evento de detonação cadastrado nesse dia.</div>`;
  }

  if (avancosDoDia.length > 0) {
    html += `<div style="font-size:12px; color:var(--text-soft); margin:12px 0 8px;">Avanço registrado nesse dia:</div>`;
    avancosDoDia.forEach(a => {
      html += `<div class="subtitulo2">${a.frente} — ${a.etapa}: PK ${a.pkInicial || '-'} a ${a.pkFinal || '-'}, avanço <b>${a.avanco}m</b>${a.observacao ? ' · ' + a.observacao : ''}</div>`;
    });
  }

  return html;
}

// ✅ "quando termina [frente]" — usa o avanço diário detalhado (que já
// calcula início/término previsto e os totais) pra responder término,
// se está dentro ou fora do previsto, e o desvio
async function montarRespostaTermino(termo) {
  const frente = await acharFrentePorNome(termo);

  if (!frente) {
    return `<p style="font-size:13px; color:var(--text-soft); text-align:left; margin-top:10px;">Não identifiquei de qual frente você está falando. Tente incluir o nome, tipo "quando termina o Apêndice".</p>`;
  }

  const etapas = frente.AvancoPorEtapa || [];
  if (etapas.length === 0) {
    return `<p style="font-size:13px; color:var(--text-soft); text-align:left; margin-top:10px;">Ainda não tenho dados de avanço detalhado pra ${formatarTitulo(frente.Nome)}.</p>`;
  }

  let html = `<div style="font-size:12px; color:var(--text-soft); margin:10px 0 8px; text-align:left;">${formatarTitulo(frente.Nome)}:</div>`;
  etapas.forEach(et => {
    const desvio = Math.round(((et.TotalRealizado || 0) - (et.TotalPrevisto || 0)) * 100) / 100;
    let status;
    if (!et.InicioRealizado) {
      status = 'ainda não iniciado';
    } else if (desvio >= -0.05) {
      status = 'dentro do previsto';
    } else {
      status = `atrasado ${Math.abs(desvio)}m`;
    }
    html += `<div class="subtitulo2">${et.Etapa} — término previsto: <b>${et.TerminoPrevisto || '-'}</b> · ${status} · desvio: ${desvio >= 0 ? '+' : ''}${desvio}m</div>`;
  });
  return html;
}

// ✅ "qual avanço tivemos em [frente] ontem/em [data]" — usa o avanço
// diário detalhado (não acumulado) de cada etapa da frente
async function montarRespostaAvancoData(termo, periodo) {
  const frente = await acharFrentePorNome(termo);

  function diaNoPeriodo(diaStr) {
    if (periodo.tipo === 'dia') return diaStr === formatarDataCurta(periodo.data);
    const d = parseDiaMes(diaStr);
    return d && d >= periodo.inicio && d <= periodo.fim;
  }

  function coletar(nomeFrente, avancoPorEtapa, destino) {
    (avancoPorEtapa || []).forEach(et => {
      (et.Dias || []).forEach(dia => {
        if (diaNoPeriodo(dia.Data) && dia.DiarioRealizado !== null && dia.DiarioRealizado !== undefined && dia.DiarioRealizado > 0) {
          destino.push({ frente: formatarTitulo(nomeFrente), etapa: et.Etapa, data: dia.Data, avanco: dia.DiarioRealizado, obs: dia.Observacoes });
        }
      });
    });
  }

  const itens = [];

  if (frente) {
    // ✅ pergunta com frente específica (ex: "avanço na SSR 04 ontem")
    coletar(frente.Nome, frente.AvancoPorEtapa, itens);
  } else {
    // ✅ pergunta sem frente específica (ex: "quais avanços tivemos ontem")
    // — busca em todas as frentes
    const snap = await db.collection('Frentes').get();
    snap.forEach(doc => {
      const f = doc.data();
      coletar(f.Nome, f.AvancoPorEtapa, itens);
    });
  }

  if (itens.length === 0) {
    const contexto = frente ? ` em ${formatarTitulo(frente.Nome)}` : '';
    return `<p style="font-size:13px; color:var(--text-soft); text-align:left; margin-top:10px;">Não encontrei avanço registrado${contexto} para ${periodo.rotulo}.</p>`;
  }

  const mostrarData = periodo.tipo === 'intervalo'; // ✅ num intervalo, mostra a data de cada item
  let html = `<div style="font-size:12px; color:var(--text-soft); margin:10px 0 8px; text-align:left;">Avanço em ${periodo.rotulo}:</div>`;
  itens.forEach(i => {
    html += `<div class="subtitulo2">${i.frente} — ${i.etapa}${mostrarData ? ' (' + i.data + ')' : ''}: avanço <b>${i.avanco}m</b>${i.obs ? ' · ' + i.obs : ''}</div>`;
  });
  return html;
}

// ✅ acha a frente (coleção "Frentes") pelo nome mencionado na pergunta
async function acharFrentePorNome(termo) {
  const snap = await db.collection('Frentes').get();
  let encontrada = null;

  snap.forEach(doc => {
    const f = doc.data();
    const nomeNorm = normalizarTexto(f.Nome);
    if (termo.includes(nomeNorm) || nomeNorm.includes(termo)) encontrada = f;
  });

  if (!encontrada) {
    snap.forEach(doc => {
      const f = doc.data();
      const partes = String(f.Nome).split('-').map(p => normalizarTexto(p.trim()));
      if (partes.some(p => p.length > 3 && termo.includes(p))) encontrada = f;
    });
  }

  return encontrada;
}

function montarRespostaPorData(frentes, dataStr, rotulo) {
  const itens = [];
  frentes.forEach(f => {
    (f.Tarefas || []).forEach(t => {
      const dia = (t.Diario || []).find(d => d.Data === dataStr);
      if (dia) {
        itens.push({ frente: formatarTitulo(f.Nome), tarefa: t.Nome, valor: dia.Valor, unidade: t.Unidade });
      }
    });
  });

  if (itens.length === 0) {
    return `<p style="font-size:13px; color:var(--text-soft); text-align:left; margin-top:10px;">Nada previsto para ${rotulo} (${dataStr}) em nenhuma frente.</p>`;
  }

  let html = `<div style="font-size:12px; color:var(--text-soft); margin:10px 0 8px; text-align:left;">Previsto para ${rotulo} (${dataStr}):</div>`;
  itens.forEach(i => {
    html += `<div class="subtitulo2">${i.frente} — ${i.tarefa}: <b>${i.valor}${i.unidade}</b></div>`;
  });
  return html;
}

function montarRespostaSemana(frentes, hoje) {
  const daqui7 = new Date(hoje);
  daqui7.setDate(daqui7.getDate() + 7);

  const itens = [];
  frentes.forEach(f => {
    (f.Tarefas || []).forEach(t => {
      const inicio = parseDiaMes(t.InicioPrevisto);
      if (inicio && inicio >= hoje && inicio <= daqui7) {
        itens.push({
          frente: formatarTitulo(f.Nome), tarefa: t.Nome,
          inicio: t.InicioPrevisto, total: t.TotalPrevisto, unidade: t.Unidade,
        });
      }
    });
  });

  if (itens.length === 0) {
    return `<p style="font-size:13px; color:var(--text-soft); text-align:left; margin-top:10px;">Nenhuma tarefa começando nos próximos 7 dias.</p>`;
  }

  let html = `<div style="font-size:12px; color:var(--text-soft); margin:10px 0 8px; text-align:left;">Começando nos próximos 7 dias:</div>`;
  itens.forEach(i => {
    html += `<div class="subtitulo2">${i.frente} — ${i.tarefa} (início ${i.inicio}): <b>${i.total}${i.unidade}</b> previstos</div>`;
  });
  return html;
}

function montarRespostaFrente(frente) {
  const tarefas = frente.Tarefas || [];
  let html = `<div style="font-size:12px; color:var(--text-soft); margin:10px 0 8px; text-align:left;">${formatarTitulo(frente.Nome)}:</div>`;
  tarefas.forEach(t => {
    html += `<div class="subtitulo2">${t.Nome}${t.Subgrupo ? ' (' + t.Subgrupo + ')' : ''} — Início ${t.InicioPrevisto || '-'} · Término ${t.TerminoPrevisto || '-'} · <b>${t.TotalPrevisto}${t.Unidade}</b></div>`;
  });
  return html;
}

// ✅ simplificado a pedido: só o nome das frentes, sem datas/metragens
function montarRespostaNaoPrevisto(frentes) {
  const itens = [];
  const vistos = new Set(); // ✅ evita repetir a mesma combinação frente+tarefa

  frentes.forEach(f => {
    (f.Tarefas || []).forEach(t => {
      let foraDoPrevisto = false;

      if (t.ForaDoPlanejado) {
        foraDoPrevisto = (t.DiarioRealizado || []).length > 0;
      } else {
        const datasPrevisto = new Set((t.Diario || []).map(d => d.Data));
        foraDoPrevisto = (t.DiarioRealizado || []).some(d => !datasPrevisto.has(d.Data));
      }

      if (foraDoPrevisto) {
        const chave = f.Nome + '|' + t.Nome;
        if (!vistos.has(chave)) {
          vistos.add(chave);
          itens.push({ frente: formatarTitulo(f.Nome), tarefa: t.Nome });
        }
      }
    });
  });

  if (itens.length === 0) {
    return `<p style="font-size:13px; color:var(--text-soft); text-align:left; margin-top:10px;">Não encontrei nenhum trabalho realizado fora do que estava previsto.</p>`;
  }

  let html = `<div style="font-size:12px; color:var(--text-soft); margin:10px 0 8px; text-align:left;">Realizado fora do planejado:</div>`;
  itens.forEach(i => {
    html += `<div class="subtitulo2">${i.frente}: ${i.tarefa}</div>`;
  });
  return html;
}


async function abrirNotificacao(idNotif, nomeFrente) {

  const user = auth.currentUser.email;

  const ref = db.collection("Notificacoes").doc(idNotif);

  const docSnap = await ref.get();
  const dados = docSnap.data();

  let lista = dados.lidaPor || [];

  if (!lista.includes(user)) {
    lista.push(user);
  }

  await ref.update({
    lidaPor: lista
  });

  await carregarContadorNotif();

  const snap = await db.collection("Frentes")
    .where("Nome", "==", nomeFrente)
    .get();

  if (!snap.empty) {
    const data = snap.docs[0].data();

    document.getElementById("notificacoes").style.display = "none";
    abrir(data);
  }
}

      });

    }
  } // ✅ fecha o FOR

async function carregarContadorNotif() {

  const user = auth.currentUser.email;

  const snap = await db.collection("Notificacoes")
    .orderBy("data", "desc")
    .get();
  
  let naoLidas = 0;

  snap.forEach(doc => {

    const n = doc.data();

    if (!n.data) return; // ✅ ignora sem data

    if (!n.lidaPor || !n.lidaPor.includes(user)) {
      naoLidas++;
    }

  });

  document.querySelectorAll("#contadorNotif").forEach(el => {
    el.innerText = naoLidas;
  });
}
