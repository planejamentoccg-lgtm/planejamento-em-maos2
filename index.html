<!DOCTYPE html>
<html>
<head>
  <title>Planejamento em Mãos</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ FONTE CORRETA -->
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

  <style>

    body {
      margin: 0;
      font-family: 'Lato', sans-serif;
      background: #f4f6f8;
      text-align: center;
    }

    #topo {
      display: flex;
      align-items: center;
      background: white;
      padding: 10px 20px;
      border-bottom: 1px solid #ddd;
    }

    #topo img { height: 50px; }

    #topo h2 { margin-left: 15px; }

    #banner {
      height: 240px;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 32px;
      text-shadow: 2px 2px 6px black;
    }

    #lista button {
      width: 300px;
      margin: 10px auto;
      padding: 12px;
      background: #1f6e8c;
      color: white;
      border: none;
      border-radius: 5px;
      display: block;
    }

    .bloco {
      padding: 25px;
      border-bottom: 1px solid #ddd;
    }

    img {
      width: 90%;
      border-radius: 8px;
      margin: 10px 0;
    }

    /* ✅ RESPONSIVO */
    @media (max-width: 768px) {

      #banner {
        height: 160px;
        font-size: 22px;
      }

      #lista button {
        width: 90%;
      }

      #topo img {
        height: 40px;
      }

      #topo h2 {
        font-size: 16px;
      }

    }

  </style>
</head>

<body>

<div id="login">
  <h2>Login</h2>
  <input id="email" type="email"><br><br>
  <input id="senha" type="password"><br><br>
  <button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none;">

  <div id="lista"></div>

  <div id="detalhe" style="display:none;">

    <div id="topo">
      <img src="https://i.imgur.com/iZ8gr1i.png">
      <h2>Planejamento em Mãos</h2>
    </div>

    <div id="banner"><span id="titulo"></span></div>

    <div id="conteudo"></div>

    <button onclick="voltar()">Voltar</button>

  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDabKVmo13MIUbtVx2O0lSJMuUT7X1DE-k",
  authDomain: "cortex-planejamento.firebaseapp.com",
  projectId: "cortex-planejamento"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

async function login() {

  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  try {
    const cred = await auth.signInWithEmailAndPassword(email, senha);
    const user = cred.user;

    const device = navigator.userAgent;

    const ref = db.collection("users_devices").doc(user.uid);
    const snap = await ref.get();

    if (!snap.exists) {
      await ref.set({ device });
    } else if (snap.data().device !== device) {
      alert("🚫 Vinculado a outro dispositivo");
      await auth.signOut();
      return;
    }

    login.style.display = "none";
    app.style.display = "block";

    carregar();

  } catch (e) {
    alert(e.message);
  }
}


// ✅ LISTA
async function carregar() {

  lista.innerHTML = "<h2>Frentes</h2>";

  const snap = await db.collection("Frentes").get();

  snap.forEach(doc => {

    const data = doc.data();

    const btn = document.createElement("button");
    btn.innerText = data.Nome;
    btn.onclick = () => abrir(data);

    lista.appendChild(btn);
  });
}


// ✅ FUNÇÃO COMPLETA
function criarBloco(s, titulo) {

  if (!s) return "";

  let html = '<div class="bloco">';
  html += '<h3>' + titulo + '</h3>';

  if (s["Data Prevista"]) html += '<p>' + s["Data Prevista"] + '</p>';
  if (s.Total) html += '<p>Total: ' + s.Total + '</p>';
  if (s["Avanço"]) html += '<p>Avanço: ' + s["Avanço"] + '</p>';
  if (s.Situacao) html += '<p><b>' + s.Situacao + '</b></p>';

  if (s.Inicio) html += '<p>' + s.Inicio + '</p>';
  if (s.Previsto) html += '<p>' + s.Previsto + '</p>';
  if (s.Realizado) html += '<p>' + s.Realizado + '</p>';

  if (s.Grafico && s.Grafico.startsWith("http"))
    html += '<img src="' + s.Grafico + '">';

  if (s.Imagem1 && s.Imagem1.startsWith("http"))
    html += '<img src="' + s.Imagem1 + '">';

  if (s.Imagem2 && s.Imagem2.startsWith("http"))
    html += '<img src="' + s.Imagem2 + '">';

  if (s.Imagem3 && s.Imagem3.startsWith("http"))
    html += '<img src="' + s.Imagem3 + '">';

  html += '</div>';

  return html;
}


// ✅ DETALHE INTELIGENTE
function abrir(data) {

  lista.style.display = "none";
  detalhe.style.display = "block";

  titulo.innerText = data.Nome;
  banner.style.backgroundImage = `url('${data.Imagem}')`;

  let html = "";

  // ✅ CASO TENHA LADOS
  html += criarBloco(data.LadoSul, "LADO SUL");
  html += criarBloco(data.LadoOeste, "LADO OESTE");

  // ✅ CASO NÃO TENHA LADOS (tipo Carioca)
  if (!data.LadoSul && !data.LadoOeste) {
    html += criarBloco(data, "DADOS GERAIS");
  }

  conteudo.innerHTML = html;
}


// ✅ VOLTAR
function voltar() {
  lista.style.display = "block";
  detalhe.style.display = "none";
}

</script>

</body>
</html>
