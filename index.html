<script>

const firebaseConfig = {
  apiKey: "AIzaSyDabKVmo13MIUbtVx2O0lSJMuUT7X1DE-k",
  authDomain: "cortex-planejamento.firebaseapp.com",
  projectId: "cortex-planejamento"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ✅ LOGIN
async function login() {

  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  try {
    await auth.signInWithEmailAndPassword(email, senha);

    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";

    carregar();

  } catch(e) {
    alert(e.message);
  }
}

// ✅ HOME
async function carregar() {

  const lista = document.getElementById("lista");

lista.innerHTML = `
  <div id="topo">

  <img src="https://i.imgur.com/iZ8gr1i.png" style="height:38px;">

  <div class="notif" onclick="abrirNotificacoes()">
    <img src="https://cdn-icons-png.flaticon.com/512/3602/3602145.png">
    <span id="contadorNotif">0</span>
  </div>

</div>
<div class="painel">

  <span class="label">PLANEJAMENTO EM MÃOS</span>
  <h1>Painel de Progresso</h1>

  <div class="metricas">
    
    <div>
      <h2 id="qtFrentes">0</h2>
      <p>Frentes Ativas</p>
    </div>

    <div>
      <h2>2026</h2>
      <p>Em Curso</p>
    </div>

  </div>

</div>

<div class="topoLista">
  <h3>Frentes de Serviço</h3>
  <span class="verMais">ver all →</span>
</div>
<div id="botoes"></div>

<h2 class="tituloHome">Próximas Semanas</h2>
<button class="btnSec" onclick="abrirSemanas()">Ver Mais</button>
`;

  const botoes = document.getElementById("botoes");

  const snap = await db.collection("Frentes").get();

snap.forEach(doc => {

  const data = doc.data();

  const card = document.createElement("div");
  card.className = "linhaFrente";

  let progresso = data.Percentual || 0;

  card.innerHTML = `
    <div class="iconeFrente">
      <img src="https://cdn-icons-png.flaticon.com/128/2716/2716778.png">
    </div>

    <div class="infoFrente">

      <div class="topoFrente">
        <span class="nomeFrente">${data.Nome}</span>
        <span class="percentual">${progresso}%</span>
        <span class="seta">›</span>
      </div>

      <div class="barra">
        <div class="barraPreenchida" style="width:${progresso}%"></div>
      </div>

    </div>
  `;

  card.onclick = () => abrir(data);

  botoes.appendChild(card);

});
  document.getElementById("qtFrentes").innerText = snap.size;
  await verificarAtualizacoes();
  await carregarContadorNotif();
}

async function abrirNotificacoes() {

  // esconder home
  document.getElementById("lista").style.display = "none";

  // mostrar notificações
  document.getElementById("notificacoes").style.display = "block";

  const container = document.getElementById("listaNotificacoes");
  container.innerHTML = "";

  const snap = await db.collection("Notificacoes")
    .orderBy("data", "desc")
    .get();

  snap.forEach(doc => {
    const n = doc.data();

    const nomeFrente = n.frente || "Sem nome";

    let dataFormatada = "";

    if (n.data) {
      const dataObj = new Date(n.data);
      dataFormatada = dataObj.toLocaleString("pt-BR");
    }

    const user = auth.currentUser.email;
    const lida = (n.lidaPor && n.lidaPor.includes(user));
    const corFundo = lida ? "#ffffff" : "#e3f2fd";

container.innerHTML += `
  <div onclick="abrirNotificacao('${doc.id}', '${nomeFrente}')"
       style="
        padding:12px;
        border-bottom:1px solid #eee;
        text-align:left;
        cursor:pointer;
        background:${corFundo};
        transition: 0.3s;
        border-left: ${lida ? "4px solid transparent" : "4px solid #1f6e8c"};
      ">
        <b>${nomeFrente}</b><br>
        A frente de serviço foi atualizada<br>
        <small style="color:#888;">${dataFormatada}</small>
      </div>
    `;
  });

}


// ✅ BLOCO (INTACTO)
function criarBloco(s, titulo) {

  if (!s) return "";

  let html = '<div class="bloco">';
  html += '<div class="tituloBloco">' + titulo + '</div>';

  if (s["Data Prevista"]) html += '<p>' + s["Data Prevista"] + '</p>';
  if (s.Total) html += '<p><b>Total:</b> ' + s.Total + '</p>';
  if (s["Avanço"]) html += '<p><b>Avanço:</b> ' + s["Avanço"] + '</p>';

  if (s.Situacao) html += '<p class="situacao">' + s.Situacao + '</p>';

  if (s.Inicio) html += '<p>' + s.Inicio + '</p>';
  if (s.Previsto) html += '<p>' + s.Previsto + '</p>';
  if (s.Realizado) html += '<p>' + s.Realizado + '</p>';

  if (s.Grafico && s.Grafico.startsWith("http"))
    html += '<img src="' + s.Grafico + '">';

  if (s.Imagem1 && s.Imagem1.startsWith("http"))
    html += '<img src="' + s.Imagem1 + '">';

  if (s.Imagem2 && s.Imagem2.startsWith("http"))
    html += '<img src="' + s.Imagem2 + '">';

  if (s.Imagem3 && s.Imagem3.startsWith("http"))
    html += '<img src="' + s.Imagem3 + '">';

  html += '</div>';

  return html;
}


// ✅ DETALHE
function abrir(data) {

  document.getElementById("lista").style.display = "none";
  document.getElementById("detalhe").style.display = "block";

  document.getElementById("titulo").innerText = data.Nome;
  document.getElementById("banner").style.backgroundImage =
    "url('" + data.Imagem + "')";

  let html = "";

  html += criarBloco(data.LadoSul, "LADO SUL");
  html += criarBloco(data.LadoOeste, "LADO OESTE");

  if (!data.LadoSul && !data.LadoOeste) {
    html += criarBloco(data, "DADOS GERAIS");
  }

  document.getElementById("conteudo").innerHTML = html;
}


// ✅ NOVA FUNÇÃO
async function abrirSemanas() {

  document.getElementById("lista").style.display = "none";
  document.getElementById("semanas").style.display = "block";

  const container = document.getElementById("conteudoSemanas");
  container.innerHTML = "";

  const snap = await db.collection("ProximasSemanas").get();

  snap.forEach(doc => {

    const d = doc.data();

    let html = '<div class="bloco">';
    html += '<h3>' + d.Nome + '</h3>';

    if (d.Atividade) html += '<p>' + d.Atividade + '</p>';
    if (d.Inicio) html += '<p>Início: ' + d.Inicio + '</p>';
    if (d.Termino) html += '<p>Término: ' + d.Termino + '</p>';
    if (d.Tendencia) html += '<p>Tendência: ' + d.Tendencia + '</p>';
    if (d.Projeto) html += '<p>Projeto: ' + d.Projeto + '</p>'

    html += '<div class="linhaImagens">';
    if (d.Imagem1) html += '<img src="' + d.Imagem1 + '">';
    if (d.Imagem2) html += '<img src="' + d.Imagem2 + '">';
    html += '</div>';

    html += '</div>';

    container.innerHTML += html;
  });
}


// ✅ VOLTAR
function voltar() {
  document.getElementById("lista").style.display = "block";
  document.getElementById("detalhe").style.display = "none";
}

function voltarHome() {
  document.getElementById("lista").style.display = "block";
  document.getElementById("semanas").style.display = "none";
  document.getElementById("notificacoes").style.display = "none";
}
async function abrirNotificacao(idNotif, nomeFrente) {

  const user = auth.currentUser.email;

  const ref = db.collection("Notificacoes").doc(idNotif);

  const docSnap = await ref.get();
  const dados = docSnap.data();

  let lista = dados.lidaPor || [];

  if (!lista.includes(user)) {
    lista.push(user);
  }

  await ref.update({
    lidaPor: lista
  });

  await carregarContadorNotif();

  const snap = await db.collection("Frentes")
    .where("Nome", "==", nomeFrente)
    .get();

  if (!snap.empty) {
    const data = snap.docs[0].data();

    document.getElementById("notificacoes").style.display = "none";
    abrir(data);
  }
}
 async function verificarAtualizacoes() {

  const snap = await db.collection("Frentes").get();

  for (const doc of snap.docs) {

    const data = doc.data();

    if (!data.ultimaAtualizacao) continue;

    const atualizacao = data.ultimaAtualizacao.toDate();

    let ultimaNotif = data.ultimaNotificada
      ? data.ultimaNotificada.toDate()
      : new Date(0);

    // ✅ só cria se a frente foi atualizada DEPOIS da última notificação
    if (atualizacao > ultimaNotif) {

      await db.collection("Notificacoes").add({
        mensagem: `A frente de serviço ${data.Nome} foi atualizada`,
        frente: data.Nome,
        data: new Date().toISOString(),
        lidaPor: []
    });

      // ✅ atualiza o controle para não duplicar
      await db.collection("Frentes").doc(doc.id).update({
        ultimaNotificada: data.ultimaAtualizacao
      });

    }

  }
}
async function carregarContadorNotif() {

  const user = auth.currentUser.email;
  const snap = await db.collection("Notificacoes").get();

  let naoLidas = 0;

  snap.forEach(doc => {
    const n = doc.data();

    if (!n.lidaPor || !n.lidaPor.includes(user)) {
      naoLidas++;
    }
  });

  document.getElementById("contadorNotif").innerText = naoLidas;
}
</script>
