<!DOCTYPE html>
<html>
<head>
  <title>Planejamento em Mãos</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ FONTE CORRETA -->
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Lato', sans-serif;
      background: #f4f6f8;
      text-align: center;
    }

    #topo {
      display: flex;
      align-items: center;
      background: #fff;
      padding: 10px 20px;
      border-bottom: 1px solid #ddd;
    }

    #topo img { height: 50px; }

    #topo h2 {
      margin-left: 15px;
      color: #2c3e50;
    }

    #banner {
      height: 240px;
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 34px;
      text-shadow: 2px 2px 6px black;
    }

    #lista button {
      display: block;
      width: 300px;
      margin: 10px auto;
      padding: 12px;
      background: #1f6e8c;
      color: white;
      border: none;
      border-radius: 5px;
    }

    .bloco {
      padding: 25px;
    }

    .titulo {
      font-size: 22px;
      color: #1f6e8c;
      font-weight: bold;
    }

    img {
      max-width: 90%;
      margin: 15px 0;
      border-radius: 8px;
    }

    button {
      margin: 20px;
      padding: 10px 20px;
    }
  </style>
</head>

<body>

<div id="login">
  <h2>Login</h2>
  <input id="email" type="email"><br><br>
  <input id="senha" type="password"><br><br>
  <button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none;">

  <div id="lista"></div>

  <div id="detalhe" style="display:none;">

    <div id="topo">
      <img src="https://i.imgur.com/iZ8gr1i.png">
      <h2>Planejamento em Mãos</h2>
    </div>

    <div id="banner">
      <span id="titulo"></span>
    </div>

    <div id="conteudo"></div>

    <button onclick="voltar()">Voltar</button>

  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDabKVmo13MIUbtVx2O0lSJMuUT7X1DE-k",
  authDomain: "cortex-planejamento.firebaseapp.com",
  projectId: "cortex-planejamento"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();


// ✅ LOGIN COM SEGURANÇA
async function login() {

  const email = email.value;
  const senha = senha.value;

  try {
    const cred = await auth.signInWithEmailAndPassword(email, senha);
    const user = cred.user;

    const device = navigator.userAgent + screen.width;

    const ref = db.collection("users_devices").doc(user.uid);
    const snap = await ref.get();

    if (!snap.exists) {
      await ref.set({ device });
    } else if (snap.data().device !== device) {
      alert("🚫 Já vinculado a outro dispositivo");
      await auth.signOut();
      return;
    }

    login.style.display = "none";
    app.style.display = "block";

    carregar();

  } catch(e) {
    alert(e.message);
  }
}


// ✅ LISTAR
async function carregar() {

  lista.innerHTML = "<h2>Frentes</h2>";

  const snap = await db.collection("Frentes").get();

  snap.forEach(doc => {
    const data = doc.data();

    const btn = document.createElement("button");
    btn.innerText = data.Nome;
    btn.onclick = () => abrir(data);

    lista.appendChild(btn);
  });
}


// ✅ SEÇÃO COMPLETA (COM IMAGENS)
function secao(s, titulo) {

  if (!s) return "";

  return `
    <div class="bloco">

      <div class="titulo">${titulo}</div>

      ${s["Data Prevista"] ? `<p>${s["Data Prevista"]}</p>` : ""}
      ${s.Total ? `<p>Total: ${s.Total}</p>` : ""}
      ${s["Avanço"] ? `<p>Avanço: ${s["Avanço"]}</p>` : ""}

      ${s.Situacao ? `<p><b>${s.Situacao}</b></p>` : ""}

      ${s.Grafico ? `<img src="${s.Grafico}{s.Imagem1     ${s.Imagem2 ? `<img src="${s.Imagem2}    ${s.Imagem3 ? `<img src="${s.Imagem3}   </div>
  `;
}


// ✅ DETALHE
function abrir(data) {

  lista.style.display = "none";
  detalhe.style.display = "block";

  titulo.innerText = data.Nome;
  banner.style.backgroundImage = `url('${data.Imagem}')`;

  conteudo.innerHTML =
    secao(data.LadoSul, "LADO SUL") +
    secao(data.LadoOeste, "LADO OESTE");
}


// ✅ VOLTAR
function voltar() {
  lista.style.display = "block";
  detalhe.style.display = "none";
}

</script>

</body>
</html>
