/* ===========================================================
   ✅ REDESIGN DA TELA INICIAL (hero, régua de progresso, agenda, gantt)
   =========================================================== */
:root{
  --ink:#131F1D;
  --ink-2:#1C2B28;
  --paper:#F5F4EF;
  --paper-2:#EDECE5;
  --line:#D8D7CD;
  --line-dark:#2E3E3A;
  --accent:#6F8F3F;
  --accent-bright:#8FB84B;
  --text-soft:#6B7570;
  --text-soft-dark:#8FA098;
}

/* ✅ TEMA ESCURO — inverte as variáveis; tudo que usa var(--...) responde
   automaticamente. Vale pra tela inicial e pro gráfico de Gantt. */
body.tema-escuro{
  --ink:#F2F1EA;
  --ink-2:#EDECE5;
  --paper:#12201C;
  --paper-2:#1C2B28;
  --line:#33443F;
  --line-dark:#465852;
  --accent:#8FB84B;
  --accent-bright:#A8D666;
  --text-soft:#93A49C;
  --text-soft-dark:#6B7570;
  background:var(--paper);
}

.toggleTema{
  width:20px; height:20px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
  font-size:15px;
  margin-right:14px;
}

#lista{ background:var(--paper); }

/* -------- topo -------- */
#lista #topo{
  background:var(--paper);
  border-bottom:1px solid var(--line);
}

/* -------- hero -------- */
.heroNovo{
  background:linear-gradient(160deg, var(--ink) 0%, var(--ink-2) 100%);
  padding:28px 20px 26px;
  color:#F2F1EA;
  text-align:left;
}
.heroNovo .eyebrow{
  font-family:'IBM Plex Mono', monospace;
  font-size:10px;
  letter-spacing:0.16em;
  color:var(--accent-bright);
  text-transform:uppercase;
  margin-bottom:10px;
}
.heroNovo h1{
  font-family:'Archivo', sans-serif;
  font-weight:800;
  font-size:30px;
  letter-spacing:-0.02em;
  line-height:1.05;
  margin-bottom:22px;
  color:#F2F1EA;
}
.kpiGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1px;
  background:var(--line-dark);
  border:1px solid var(--line-dark);
  max-width:700px;
  margin:0 auto;
}
.kpiCard{
  position:relative;
  background:var(--ink);
  padding:16px 14px 14px;
  text-align:left;
}
.kpiCard::before, .kpiCard::after{
  content:''; position:absolute; width:9px; height:9px;
}
.kpiCard::before{ top:6px; left:6px; border-top:1.5px solid var(--accent); border-left:1.5px solid var(--accent); }
.kpiCard::after{ bottom:6px; right:6px; border-bottom:1.5px solid var(--accent); border-right:1.5px solid var(--accent); }
.kpiCard .val{
  font-family:'IBM Plex Mono', monospace;
  font-weight:600;
  font-size:24px;
  color:#F2F1EA;
  line-height:1;
  margin-bottom:8px;
}
.kpiCard .val.pos{ color:var(--accent-bright); }
.kpiCard .lbl{
  font-family:'IBM Plex Sans', sans-serif;
  font-size:10.5px;
  letter-spacing:0.04em;
  color:var(--text-soft-dark);
  text-transform:uppercase;
}

/* -------- seções -------- */
.secaoNova{ padding:26px 20px 6px; max-width:700px; margin:0 auto; text-align:left; }
.secaoNova .cabecalho{
  display:flex; align-items:baseline; justify-content:space-between;
  margin-bottom:14px; flex-wrap:wrap; gap:8px;
}
.secaoNova .tituloSecao{
  font-family:'IBM Plex Mono', monospace;
  font-size:10.5px;
  letter-spacing:0.14em;
  text-transform:uppercase;
  color:var(--text-soft);
}
.secaoNova .contagemSecao{
  font-family:'IBM Plex Mono', monospace;
  font-size:10.5px;
  color:var(--text-soft);
}
.secaoNova hr.regra{ border:none; border-top:1px solid var(--line); margin-bottom:18px; }

.btnGantt{
  font-family:'IBM Plex Mono', monospace;
  font-size:10px;
  letter-spacing:0.06em;
  text-transform:uppercase;
  color:var(--ink);
  background:var(--paper-2);
  border:1px solid var(--line);
  padding:6px 10px;
  cursor:pointer;
  border-radius:2px;
}
.btnGantt:hover{ background:var(--line); }

/* -------- régua de progresso (frentes) -------- */
.frenteNova{
  padding:16px 0;
  border-bottom:1px solid var(--line);
  cursor:pointer;
}
.frenteNova:last-child{ border-bottom:none; }
.frenteNova .topo2{
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:10px;
}
.frenteNova .nome2{
  font-family:'Archivo', sans-serif;
  font-weight:700;
  font-size:16.5px;
  color:var(--ink);
  letter-spacing:-0.01em;
}
.tagStatus{
  display:inline-flex; align-items:center; gap:5px;
  font-family:'IBM Plex Mono', monospace;
  font-size:9.5px;
  letter-spacing:0.06em;
  text-transform:uppercase;
  padding:3px 7px;
  border:1px solid var(--accent);
  color:var(--accent);
}
.tagStatus.atrasada{ border-color:#c0392b; color:#c0392b; }
.tagStatus .ponto{ width:5px; height:5px; border-radius:50%; background:currentColor; }

.regua{ position:relative; height:16px; margin-bottom:8px; }
.regua-trilho{
  position:absolute; top:6px; left:0; right:0; height:3px;
  background:var(--paper-2); border:1px solid var(--line);
}
.regua-preenchida{
  position:absolute; top:6px; left:0; height:3px; background:var(--accent);
}
.regua-marcas{
  position:absolute; top:0; left:0; right:0; height:16px;
  display:flex; justify-content:space-between;
}
.regua-marcas span{ width:1px; height:6px; background:var(--line); }
.regua-marcas span:nth-child(5n+1){ height:9px; background:#B9B8AC; }

.frenteNova .baixo2{ display:flex; align-items:center; justify-content:space-between; }
.frenteNova .pct2{
  font-family:'IBM Plex Mono', monospace;
  font-weight:600; font-size:14px; color:var(--ink);
}
.frenteNova .meta2{
  font-family:'IBM Plex Mono', monospace;
  font-size:10.5px; color:var(--text-soft);
}

/* -------- agenda (próximas semanas) -------- */
.agendaItem{
  display:flex; gap:16px;
  padding:16px 0 22px;
  border-bottom:1px solid var(--line);
  cursor:pointer;
}
.agendaItem:last-child{ border-bottom:none; }
.agendaData{
  font-family:'IBM Plex Mono', monospace;
  text-align:center;
  padding-right:16px;
  border-right:1px solid var(--line);
  min-width:44px;
  flex-shrink:0;
}
.agendaData .dia2{ font-size:22px; font-weight:600; color:var(--ink); line-height:1; }
.agendaData .mes2{ font-size:9.5px; letter-spacing:0.1em; color:var(--text-soft); margin-top:4px; }

.agendaBody .titulo2{
  font-family:'Archivo', sans-serif;
  font-weight:700; font-size:15.5px; color:var(--ink); margin-bottom:2px;
}
.agendaBody .subtitulo2{
  font-family:'IBM Plex Mono', monospace;
  font-size:11px; color:var(--accent); margin-bottom:10px;
}
.agendaRow{
  font-family:'IBM Plex Sans', sans-serif;
  font-size:12px; color:var(--text-soft); margin-bottom:6px;
}
.agendaRow b{ color:var(--ink); }
.agendaVerMais{
  font-family:'IBM Plex Mono', monospace;
  font-size:10.5px; letter-spacing:0.04em; color:var(--accent);
  margin-top:4px; display:inline-block;
}

/* -------- gráfico de gantt -------- */
#telaGantt{ background:var(--paper); }
#telaGantt #topo, #semanas #topo{
  background:var(--paper);
  border-bottom:1px solid var(--line);
  color:var(--ink);
}
#semanas{ background:var(--paper); }
#bannerSemanas h1{ color:#F2F1EA; }
.ganttWrap{
  padding:16px 20px 40px;
  max-width:900px;
  margin:0 auto;
}
.ganttEixo{
  position:sticky; top:0; background:var(--paper);
  display:flex; border-bottom:1px solid var(--line-dark);
  padding-bottom:6px; margin-bottom:10px; z-index:2;
}
.ganttEixo .marcaSemana{
  font-family:'IBM Plex Mono', monospace;
  font-size:9.5px; color:var(--text-soft); flex-shrink:0;
  border-left:1px solid var(--line);
  padding-left:4px;
}
.ganttLinha{
  display:flex; align-items:center;
  margin-bottom:10px;
  position:relative;
  height:26px;
}
.ganttLabel{
  position:sticky; left:0;
  background:var(--paper);
  font-family:'IBM Plex Sans', sans-serif;
  font-size:11px; color:var(--ink);
  padding-right:10px;
  white-space:nowrap;
  z-index:1;
}
.ganttTrilha{ position:relative; height:100%; flex-shrink:0; }
.ganttBarra{
  position:absolute; top:4px; height:18px;
  background:var(--accent);
  border-radius:2px;
  min-width:6px;
}
.ganttFrenteTitulo{
  font-family:'IBM Plex Mono', monospace;
  font-size:10.5px; letter-spacing:0.1em; text-transform:uppercase;
  color:var(--text-soft); margin:22px 0 8px;
}

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDabKVmo13MIUbtVx2O0lSJMuUT7X1DE-k",
  authDomain: "cortex-planejamento.firebaseapp.com",
  projectId: "cortex-planejamento"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ✅ LOGIN
async function login() {

  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const dispositivoAtual = navigator.userAgent;

  const ref = db.collection("Sessoes").doc(email);
  const doc = await ref.get();

  // ✅ verifica se já existe sessão
  if (doc.exists) {
    const dados = doc.data();

    if (dados.dispositivo !== dispositivoAtual) {
      alert("Este usuário já está logado em outro dispositivo.");
      return;
    }
  }

  try {
    await auth.signInWithEmailAndPassword(email, senha);

    // ✅ salva sessão
    await db.collection("Sessoes").doc(email).set({
      dispositivo: dispositivoAtual,
      data: new Date()
    });

    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";

    carregar();

  } catch(e) {
    alert(e.message);
  }
}
async function logout() {

  const email = auth.currentUser.email;

  await db.collection("Sessoes").doc(email).delete();
  await auth.signOut();

  location.reload();
}

// ✅ HOME
async function carregar() {

  const lista = document.getElementById("lista");

  lista.innerHTML = `
    <div id="topo">

      <img src="https://i.imgur.com/iZ8gr1i.png" style="height:38px;">

      <div style="display:flex; align-items:center;">

        <span class="toggleTema" onclick="alternarTema()" id="iconeTema">🌙</span>

        <div class="notif" onclick="abrirNotificacoes()">
          <img src="https://cdn-icons-png.flaticon.com/512/3602/3602145.png">
          <span id="contadorNotif">0</span>
        </div>

      </div>

    </div>

    <div class="heroNovo">
      <div class="eyebrow">Planejamento em mãos</div>
      <h1>Painel de<br>Progresso</h1>

      <div class="kpiGrid">
        <div class="kpiCard">
          <div class="val" id="qtFrentes">0</div>
          <div class="lbl">Frentes ativas</div>
        </div>
        <div class="kpiCard">
          <div class="val pos" id="noPrazo">0</div>
          <div class="lbl">No prazo</div>
        </div>
        <div class="kpiCard">
          <div class="val" id="atrasadas">0</div>
          <div class="lbl">Atrasadas</div>
        </div>
        <div class="kpiCard">
          <div class="val">2028</div>
          <div class="lbl">2º Sem</div>
        </div>
      </div>
    </div>

    <section class="secaoNova">
      <div class="cabecalho">
        <span class="tituloSecao">Frentes de serviço</span>
        <span class="contagemSecao" id="contagemFrentes">00</span>
      </div>
      <hr class="regra">
      <div id="botoes"></div>
    </section>
  `;

  atualizarIconeTema();

  const botoes = document.getElementById("botoes");

  const snap = await db.collection("Frentes").get();

  let noPrazo = 0;
  let atrasadas = 0;

  // ✅ LOOP DAS FRENTES
  snap.forEach(doc => {

    const data = doc.data();

    const card = document.createElement("div");
    card.className = "frenteNova";

    let progresso = data.Percentual || 0;
    let previsto = data.Percentualprevisto || 0;

    let status = "ok";

    if (progresso < previsto) {
      status = "atrasada";
      atrasadas++;
    } else {
      noPrazo++;
    }

    // ✅ pega a situação mais recente entre as etapas, pra mostrar no rodapé
    let situacaoRecente = "";
    (data.Etapas || []).forEach(etapa => {
      if (etapa.Situacao && etapa.Situacao > situacaoRecente) situacaoRecente = etapa.Situacao;
    });

    card.innerHTML = `
      <div class="topo2">
        <span class="nome2">${data.Nome}</span>
        <span class="tagStatus ${status === "atrasada" ? "atrasada" : ""}">
          <span class="ponto"></span>
          ${status === "atrasada" ? "Em atraso" : "No prazo"}
        </span>
      </div>

      <div class="regua">
        <div class="regua-trilho"></div>
        <div class="regua-preenchida" style="width:${Math.min(progresso, 100)}%"></div>
        <div class="regua-marcas">
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span>
          <span></span>
        </div>
      </div>

      <div class="baixo2">
        <span class="pct2">${progresso}%</span>
        <span class="meta2">${situacaoRecente ? "situação em " + situacaoRecente : ""}</span>
      </div>
    `;

    card.onclick = () => abrir(data);

    botoes.appendChild(card);

  });

  // ✅ METRICAS
  document.getElementById("qtFrentes").innerText = snap.size;
  document.getElementById("noPrazo").innerText = noPrazo;
  document.getElementById("atrasadas").innerText = atrasadas;
  document.getElementById("contagemFrentes").innerText = String(snap.size).padStart(2, "0");

  // ✅ PRÓXIMAS SEMANAS (nova estrutura: Nome + Tarefas[] + Diario[])
  const containerSemanas = document.createElement("div");

  containerSemanas.innerHTML = `
    <div class="cabecalho">
      <span class="tituloSecao">Próximas semanas</span>
      <button class="btnGantt" onclick="abrirGantt()">📊 Gráfico de Gantt</button>
    </div>
    <hr class="regra">
  `;

  const snapSemanas = await db.collection("ProximasSemanas").get();

  const hoje = new Date();
  const frentesSemanas = [];

  snapSemanas.forEach(doc => {
    const d = doc.data();
    const tarefas = d.Tarefas || [];
    if (tarefas.length === 0) return;

    // ✅ encontra a tarefa mais próxima (a que ainda não começou e está
    // mais perto de hoje; se todas já passaram, pega a mais recente)
    let tarefaDestaque = tarefas[0];
    let melhorOrdenacao = Infinity;

    tarefas.forEach(t => {
      const dataInicio = parseDiaMes(t.InicioPrevisto);
      if (!dataInicio) return;
      const diff = dataInicio - hoje;
      const ordenacao = diff >= 0 ? diff : (Math.abs(diff) + 1e12);
      if (ordenacao < melhorOrdenacao) {
        melhorOrdenacao = ordenacao;
        tarefaDestaque = t;
      }
    });

    frentesSemanas.push({ dados: d, destaque: tarefaDestaque, ordenacao: melhorOrdenacao });
  });

  frentesSemanas.sort((a, b) => a.ordenacao - b.ordenacao);

  // ✅ guarda pra reaproveitar no gráfico de Gantt sem precisar buscar de novo
  window.todasFrentesSemanas = frentesSemanas.map(item => item.dados);

  const MESES_ABREV = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];

  frentesSemanas.forEach(item => {
    const d = item.dados;
    const t = item.destaque;

    const partesData = (t.InicioPrevisto || '').split('/');
    const dia2 = partesData[0] || '-';
    const mes2 = partesData[1] ? MESES_ABREV[parseInt(partesData[1]) - 1] : '';

    const card = document.createElement("div");
    card.className = "agendaItem";

    card.innerHTML = `
      <div class="agendaData">
        <div class="dia2">${dia2}</div>
        <div class="mes2">${mes2}</div>
      </div>
      <div class="agendaBody">
        <div class="titulo2">${formatarTitulo(d.Nome)}</div>
        <div class="subtitulo2">${t.Nome}</div>
        <div class="agendaRow">Previsto: <b>${t.TotalPrevisto}${t.Unidade}</b></div>
        <div class="agendaRow">Início ${t.InicioPrevisto || "-"} · Término ${t.TerminoPrevisto || "-"}</div>
        <span class="agendaVerMais">Ver mais →</span>
      </div>
    `;

    card.onclick = () => abrirDetalheSemana(d);

    containerSemanas.appendChild(card);
  });

  containerSemanas.className = "secaoNova";
  lista.appendChild(containerSemanas);

// ✅ FINAL DA FUNÇÃO CARREGAR
await verificarAtualizacoes();
await carregarContadorNotif();
}

// ✅ BLOCO (INTACTO)
function criarBloco(s, titulo) {

  if (!s) return "";

  let html = '<div class="bloco">';
  html += '<div class="tituloBloco">' + titulo + '</div>';

  if (s["Data Prevista"]) html += '<p>' + s["Data Prevista"] + '</p>';
  if (s.Total) html += '<p><b>Total:</b> ' + s.Total + '</p>';
  if (s["Avanço"]) html += '<p><b>Avanço:</b> ' + s["Avanço"] + '</p>';

  if (s.Situacao) html += '<p class="situacao">' + s.Situacao + '</p>';

  if (s.Inicio) html += '<p>' + s.Inicio + '</p>';
  if (s.Previsto) html += '<p>' + s.Previsto + '</p>';
  if (s.Realizado) html += '<p>' + s.Realizado + '</p>';

  if (s.Grafico && s.Grafico.startsWith("http"))
    html += '<img src="' + s.Grafico + '">';

  if (s.Imagem1 && s.Imagem1.startsWith("http"))
    html += '<img src="' + s.Imagem1 + '">';

  if (s.Imagem2 && s.Imagem2.startsWith("http"))
    html += '<img src="' + s.Imagem2 + '">';

  if (s.Imagem3 && s.Imagem3.startsWith("http"))
    html += '<img src="' + s.Imagem3 + '">';

  html += '</div>';

  return html;
}
// ✅ formata "TÚNEL DE INTERLIGAÇÃO" -> "Túnel de Interligação"
// mas mantém siglas curtas como "SSR 04" do jeito que estão
// ✅ TEMA CLARO/ESCURO
function alternarTema() {
  const escuro = document.body.classList.toggle('tema-escuro');
  localStorage.setItem('temaEscuro', escuro ? '1' : '0');
  atualizarIconeTema();
}

function atualizarIconeTema() {
  const icone = document.getElementById('iconeTema');
  if (icone) icone.innerText = document.body.classList.contains('tema-escuro') ? '☀️' : '🌙';
}

function aplicarTemaSalvo() {
  if (localStorage.getItem('temaEscuro') === '1') {
    document.body.classList.add('tema-escuro');
  }
}
aplicarTemaSalvo();

function formatarTitulo(texto) {
  if (!texto) return texto;
  const preposicoes = ['de', 'da', 'do', 'das', 'dos', 'e'];
  return texto.trim().toLowerCase().split(' ').map((palavra, i) => {
    if (/\d/.test(palavra)) return palavra.toUpperCase();
    if (palavra.length <= 3 && !/[aeiouáéíóúãõâêôàü]/.test(palavra)) return palavra.toUpperCase();
    if (i > 0 && preposicoes.includes(palavra)) return palavra;
    return palavra.charAt(0).toUpperCase() + palavra.slice(1);
  }).join(' ');
}

// ✅ converte "dd/MM" (formato salvo pelo script) em Date, usando o ano atual
function parseDiaMes(str) {
  if (!str) return null;
  const partes = str.split('/');
  if (partes.length !== 2) return null;
  const dia = parseInt(partes[0]);
  const mes = parseInt(partes[1]) - 1;
  if (isNaN(dia) || isNaN(mes)) return null;
  return new Date(new Date().getFullYear(), mes, dia);
}

function formatarData(dataStr) {

  if (!dataStr) return { dia: "-", mes: "-", diaSemana: "-" };

  // ✅ quebra DD-MM-YYYY
  const partes = dataStr.split("-");

  const dia = parseInt(partes[0]);
  const mesIndex = parseInt(partes[1]) - 1;
  const ano = parseInt(partes[2]);

  const data = new Date(ano, mesIndex, dia);

  const meses = ["JAN","FEV","MAR","ABR","MAI","JUN",
                 "JUL","AGO","SET","OUT","NOV","DEZ"];

  const dias = ["DOM","SEG","TER","QUA","QUI","SEX","SAB"];

  return {
    dia: dia,
    mes: meses[mesIndex],
    diaSemana: dias[data.getDay()]
  };
}

// ✅ GRÁFICO DE GANTT — todas as frentes, todas as tarefas com data prevista
function abrirGantt() {

  document.getElementById("lista").style.display = "none";
  document.getElementById("telaGantt").style.display = "block";

  const container = document.getElementById("conteudoGantt");
  const frentes = window.todasFrentesSemanas || [];

  // ✅ achata todas as tarefas de todas as frentes numa lista só
  const tarefas = [];
  frentes.forEach(frente => {
    (frente.Tarefas || []).forEach(t => {
      const inicio = parseDiaMes(t.InicioPrevisto);
      if (!inicio) return;
      let termino = parseDiaMes(t.TerminoPrevisto) || inicio;
      if (termino < inicio) termino = inicio;
      tarefas.push({ frente: formatarTitulo(frente.Nome), nome: t.Nome, inicio, termino });
    });
  });

  if (tarefas.length === 0) {
    container.innerHTML = '<p style="font-family:\'IBM Plex Sans\',sans-serif; font-size:13px; color:#6B7570; padding:20px;">Nenhuma tarefa com data prevista encontrada.</p>';
    return;
  }

  const minDate = new Date(Math.min(...tarefas.map(t => t.inicio)));
  const maxDate = new Date(Math.max(...tarefas.map(t => t.termino)));
  const totalDias = Math.max(1, Math.round((maxDate - minDate) / 86400000) + 1);

  // ✅ agrupa por frente, mantendo a ordem em que apareceram
  const porFrente = {};
  tarefas.forEach(t => {
    if (!porFrente[t.frente]) porFrente[t.frente] = [];
    porFrente[t.frente].push(t);
  });

  // ✅ desenha tudo num SVG com viewBox — isso faz o gráfico inteiro se
  // redimensionar sozinho pra caber na largura da tela, seja celular
  // (vertical ou horizontal) ou computador, sem precisar rolar de lado
  const LARGURA = 1000;
  const LARGURA_LABEL = 230;
  const AREA_TEMPO = LARGURA - LARGURA_LABEL - 10;
  const ALTURA_LINHA = 20;
  const ALTURA_GRUPO = 22;
  const MARGEM_TOPO = 26;

  let totalLinhas = 0;
  Object.keys(porFrente).forEach(f => { totalLinhas += 1 + porFrente[f].length; });
  const ALTURA = MARGEM_TOPO + totalLinhas * ALTURA_LINHA + 10;

  const escalaX = dia => LARGURA_LABEL + (dia / totalDias) * AREA_TEMPO;

  const truncar = (texto, max) => texto.length > max ? texto.slice(0, max - 1) + '…' : texto;

  let svg = `<svg viewBox="0 0 ${LARGURA} ${ALTURA}" style="width:100%; height:auto; display:block; font-family:'IBM Plex Sans',sans-serif;">`;

  // ✅ eixo com 3 marcas de data (início, meio, fim do período)
  svg += `<line x1="${LARGURA_LABEL}" y1="${MARGEM_TOPO - 8}" x2="${LARGURA - 4}" y2="${MARGEM_TOPO - 8}" style="stroke:var(--line);" stroke-width="1"/>`;
  [0, Math.round(totalDias / 2), totalDias - 1].forEach(d => {
    const dt = new Date(minDate);
    dt.setDate(dt.getDate() + d);
    svg += `<text x="${escalaX(d)}" y="${MARGEM_TOPO - 12}" font-size="9" style="fill:var(--text-soft);">${formatarDataCurta(dt)}</text>`;
  });

  let y = MARGEM_TOPO;
  Object.keys(porFrente).forEach(nomeFrente => {
    svg += `<text x="4" y="${y + 13}" font-size="11" font-weight="700" style="fill:var(--ink);">${truncar(nomeFrente, 34)}</text>`;
    y += ALTURA_GRUPO;

    porFrente[nomeFrente].forEach(t => {
      const offsetDias = Math.round((t.inicio - minDate) / 86400000);
      const duracaoDias = Math.round((t.termino - t.inicio) / 86400000) + 1;
      const x1 = escalaX(offsetDias);
      const x2 = escalaX(offsetDias + duracaoDias);
      const largura = Math.max(3, x2 - x1);

      svg += `<text x="10" y="${y + 13}" font-size="8" style="fill:var(--text-soft);">${truncar(t.nome, 32)}</text>`;
      svg += `<rect x="${x1}" y="${y + 5}" width="${largura}" height="9" rx="2" style="fill:var(--accent);">
        <title>${t.nome}: ${formatarDataCurta(t.inicio)} a ${formatarDataCurta(t.termino)}</title>
      </rect>`;
      y += ALTURA_LINHA;
    });
  });

  svg += `</svg>`;

  container.innerHTML = svg;
}

function formatarDataCurta(data) {
  return String(data.getDate()).padStart(2, '0') + '/' + String(data.getMonth() + 1).padStart(2, '0');
}
